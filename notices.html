<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOIDA · 공지사항</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  :root{
    --bg:#f3f5f8; --surface:#ffffff; --line:#e8eaf0; --line-soft:#f1f3f7;
    --ink:#1c2030; --ink-2:#5a6072; --ink-3:#9298a8; --ink-4:#b6bcca;
    --primary:#1452a0; --primary-600:#0e3f80; --primary-soft:#e7f0fb;
    --shadow-sm:0 1px 2px rgba(22,26,45,.04),0 1px 3px rgba(22,26,45,.03);
    --shadow-md:0 4px 16px rgba(22,26,45,.06),0 1px 3px rgba(22,26,45,.04);
    --shadow-panel:0 2px 6px rgba(22,26,45,.05),0 12px 32px rgba(22,26,45,.10);
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{ font-family:"Pretendard Variable",Pretendard,-apple-system,system-ui,sans-serif; background:var(--bg); color:var(--ink); -webkit-font-smoothing:antialiased; letter-spacing:-.01em; }
  .app{ display:grid; grid-template-columns:236px 1fr; min-height:100vh; transition:grid-template-columns .22s ease; }
  a{ color:inherit; text-decoration:none; }

  /* ===== Sidebar (shared) ===== */
  .sidebar{ background:var(--surface); border-right:1px solid var(--line); display:flex; flex-direction:column; padding:18px 16px; position:sticky; top:0; height:100vh; overflow-y:auto; }
  .logo{ display:flex; align-items:center; gap:11px; padding:8px 8px 18px; }
  .logo-mark{ width:36px; height:36px; border-radius:11px; flex-shrink:0; background:linear-gradient(140deg,#2f74c9 0%,#1452a0 60%,#0e3f80 100%); display:flex; align-items:center; justify-content:center; box-shadow:0 5px 14px rgba(79,70,229,.34); position:relative; overflow:hidden; }
  .logo-mark::after{ content:""; position:absolute; inset:0; background:radial-gradient(65% 55% at 28% 20%, rgba(255,255,255,.42), rgba(255,255,255,0) 70%); }
  .logo-name{ font-size:20px; font-weight:800; letter-spacing:-.04em; color:#1c2030; line-height:1; }
  .logo-name b{ color:var(--primary); font-weight:800; }

  /* collapse toggle */
  .side-top{ display:flex; align-items:center; justify-content:space-between; gap:8px; }
  .collapse-btn{ position:absolute; top:29px; right:16px; z-index:5; width:30px; height:30px; border-radius:9px; border:1px solid var(--line); background:var(--surface); color:var(--ink-3); display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; transition:background .14s,color .14s; }
  .collapse-btn:hover{ background:var(--line-soft); color:var(--ink-2); }
  .collapse-btn svg{ transition:transform .22s ease; }
  /* collapsed state */
  .app.collapsed{ grid-template-columns:72px 1fr; }
  .app.collapsed .sidebar{ padding:18px 12px; align-items:stretch; }
  .app.collapsed .side-top{ flex-direction:column; gap:12px; }
  .app.collapsed .logo{ justify-content:center; }
  .app.collapsed .logo-name{ display:none; }
  .logo-expand{ display:none; }
  .app.collapsed .logo-dots{ display:none; }
  .app.collapsed .logo-expand{ display:block; }
  .app.collapsed .logo{ cursor:pointer; }
  .app.collapsed .collapse-btn{ display:none !important; }
  .app.collapsed .new-btn{ display:none; }
  .app.collapsed nav{ align-items:stretch; }
  .app.collapsed .nav-item{ justify-content:center; padding:11px 0; gap:0; }
  .app.collapsed .nav-item .nm,
  .app.collapsed .nav-item .badge{ display:none; }
  .app.collapsed .sec{ display:none; }
  .app.collapsed .upd-item{ display:none; }
  .app.collapsed .foot-item{ justify-content:center; gap:0; padding:9px 0; }
  .app.collapsed .foot-item span{ display:none; }
  .app.collapsed .foot-mail{ display:none; }

  /* hover tooltips when collapsed */
  .app.collapsed .sidebar{ overflow:visible; z-index:40; }
  .app.collapsed .nav-item, .app.collapsed .foot-item, .app.collapsed .sc-item{ position:relative; }
  .app.collapsed .nav-item[data-tip]:hover::after,
  .app.collapsed .foot-item[data-tip]:hover::after,
  .app.collapsed .sc-item[data-tip]:hover::after{
    content:attr(data-tip); position:absolute; left:calc(100% + 14px); top:50%; transform:translateY(-50%);
    background:#15182a; color:#fff; font-size:12.5px; font-weight:600; padding:7px 11px; border-radius:9px;
    white-space:nowrap; z-index:60; box-shadow:0 8px 20px rgba(22,26,45,.24); pointer-events:none;
  }
  .app.collapsed .nav-item[data-tip]:hover::before,
  .app.collapsed .foot-item[data-tip]:hover::before,
  .app.collapsed .sc-item[data-tip]:hover::before{
    content:""; position:absolute; left:calc(100% + 8px); top:50%; transform:translateY(-50%) rotate(45deg);
    width:9px; height:9px; background:#15182a; z-index:60; pointer-events:none; border-radius:1px;
  }
  .new-btn{ display:flex; align-items:center; justify-content:center; gap:8px; background:#15182a; color:#fff; border:none; border-radius:12px; padding:13px; font-size:14.5px; font-weight:700; cursor:pointer; font-family:inherit; transition:transform .12s,box-shadow .15s; box-shadow:0 6px 16px rgba(21,24,42,.22); }
  .new-btn:hover{ transform:translateY(-1px); box-shadow:0 10px 22px rgba(21,24,42,.3); }
  nav{ display:flex; flex-direction:column; gap:2px; margin-top:14px; }
  .nav-item{ display:flex; align-items:center; gap:11px; padding:10px 10px; border-radius:11px; cursor:pointer; color:var(--ink-2); font-size:14px; font-weight:600; transition:background .14s,color .14s; }
  .nav-item:hover{ background:var(--line-soft); color:var(--ink); }
  .nav-item.active{ background:var(--primary-soft); color:var(--primary); }
  .nav-item.active svg{ color:var(--primary); }
  .nav-item svg{ color:var(--ink-3); }
  .nav-item .nm{ flex:1; }
  .badge{ min-width:19px; height:19px; padding:0 6px; border-radius:20px; background:var(--primary); color:#fff; font-size:11px; font-weight:700; display:flex; align-items:center; justify-content:center; }
  .badge.muted{ background:#eef0f5; color:var(--ink-3); font-size:10.5px; font-weight:600; }
  .nav-item.dim{ color:var(--ink-3); cursor:default; }
  .nav-item.dim:hover{ background:transparent; }
  .sec{ display:flex; align-items:center; justify-content:space-between; padding:18px 10px 8px; }
  .sec-t{ font-size:11.5px; font-weight:700; color:var(--ink-3); letter-spacing:.04em; }
  .swatch{ width:14px; height:14px; border-radius:5px; flex-shrink:0; }
  .s-blue{ background:#3b82f6;} .s-orange{ background:#f59e0b;} .s-red{ background:#ef4444;} .s-yellow{ background:#eab308;} .s-sky{ background:#38bdf8;} .s-green{background:#22c55e;} .s-violet{background:#8b5cf6;} .s-slate{background:#64748b;}
  .upd-item{ display:flex; align-items:center; gap:11px; padding:8px 10px; border-radius:10px; cursor:pointer; color:var(--ink-2); font-size:13.5px; font-weight:600; transition:background .14s; }
  .upd-item:hover{ background:var(--line-soft); }
  .side-foot{ margin-top:auto; padding-top:14px; border-top:1px solid var(--line); display:flex; flex-direction:column; gap:1px; }
  .foot-item{ display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:10px; color:var(--ink-2); font-size:13.5px; font-weight:600; cursor:pointer; transition:background .14s; }
  .foot-item:hover{ background:var(--line-soft); }
  .foot-item svg{ color:var(--ink-3); }
  .foot-mail{ font-size:11.5px; color:var(--ink-3); padding:4px 10px 2px; font-weight:500; }

  /* ===== Main / page ===== */
  .main{ display:flex; flex-direction:column; min-width:0; }
  .page-head{ display:flex; align-items:flex-start; gap:16px; padding:22px 28px 0; }
  .ph-mark{ width:46px; height:46px; border-radius:13px; background:linear-gradient(140deg,#2f74c9,#0e3f80); color:#fff; display:flex; align-items:center; justify-content:center; font-size:21px; font-weight:800; flex-shrink:0; box-shadow:0 6px 16px rgba(79,70,229,.3); }
  .ph-info h1{ font-size:21px; font-weight:800; letter-spacing:-.025em; }
  .ph-sub{ margin-top:5px; font-size:13px; color:var(--ink-2); font-weight:500; }
  .ph-conn{ display:inline-flex; align-items:center; gap:5px; margin-top:7px; font-size:12px; font-weight:600; color:#10936a; }
  .ph-conn .led{ width:7px; height:7px; border-radius:50%; background:#10b981; box-shadow:0 0 0 3px rgba(16,185,129,.16); }
  .ph-right{ margin-left:auto; display:flex; align-items:center; gap:10px; }
  .count-pill{ display:inline-flex; align-items:center; gap:6px; background:var(--primary-soft); color:var(--primary-600); font-size:13px; font-weight:700; padding:8px 14px; border-radius:999px; }
  .logout-btn{ font-size:12.5px; font-weight:600; color:var(--ink-2); border:1px solid var(--line); background:var(--surface); padding:8px 13px; border-radius:10px; cursor:pointer; font-family:inherit; transition:background .14s; }
  .logout-btn:hover{ background:var(--line-soft); }

  /* status chips */
  .chips{ display:flex; flex-wrap:wrap; gap:8px; padding:18px 28px 0; }
  .chip{ display:inline-flex; align-items:center; gap:7px; padding:8px 14px; border-radius:999px; border:1px solid var(--line); background:var(--surface); font-size:13px; font-weight:600; color:var(--ink-2); cursor:pointer; transition:border-color .14s,box-shadow .14s,color .14s; }
  .chip:hover{ box-shadow:var(--shadow-sm); }
  .chip.active{ border-color:transparent; color:#fff; }
  .chip .cdot{ width:8px; height:8px; border-radius:50%; }
  .chip[data-k="all"].active{ background:#15182a; }
  .chip[data-k="vote"].active{ background:#10b981; }
  .chip[data-k="old"].active{ background:#3b82f6; }
  .chip[data-k="new"].active{ background:#8b5cf6; }
  .chip[data-k="out"].active{ background:#ef4444; }
  .chip[data-k="err"].active{ background:#f59e0b; }

  /* toolbar */
  .toolbar{ display:flex; flex-wrap:wrap; align-items:center; gap:9px; padding:16px 28px 0; }
  .search{ display:flex; align-items:center; gap:9px; background:var(--surface); border:1px solid var(--line); border-radius:11px; padding:9px 14px; min-width:280px; flex:1 1 280px; max-width:380px; }
  .search input{ flex:1; border:none; background:transparent; font-family:inherit; font-size:13.5px; color:var(--ink); outline:none; }
  .search input::placeholder{ color:var(--ink-3); }
  .search svg{ color:var(--ink-3); }
  .selbox{ display:inline-flex; align-items:center; gap:7px; background:var(--surface); border:1px solid var(--line); border-radius:11px; padding:9px 13px; font-size:13px; font-weight:600; color:var(--ink-2); cursor:pointer; transition:background .14s; }
  .selbox:hover{ background:var(--line-soft); }
  .selbox svg{ color:var(--ink-3); }
  .tb-spacer{ flex:1; }
  .btn{ display:inline-flex; align-items:center; gap:7px; padding:9px 14px; border-radius:11px; font-size:13px; font-weight:700; cursor:pointer; border:1px solid var(--line); background:var(--surface); color:var(--ink-2); font-family:inherit; transition:background .14s,box-shadow .14s,transform .12s; }
  .btn:hover{ background:var(--line-soft); }
  .btn svg{ width:15px; height:15px; }
  .btn.ghost-red{ color:#dc2626; border-color:#f3d2d2; }
  .btn.ghost-red:hover{ background:#fdf0f0; }
  .btn.primary{ background:var(--primary); border-color:var(--primary); color:#fff; box-shadow:0 4px 12px rgba(79,70,229,.28); }
  .btn.primary:hover{ background:var(--primary-600); transform:translateY(-1px); }
  .btn.warn{ background:#fff8ec; border-color:#f6e3bf; color:#b97e10; }
  .btn.warn:hover{ background:#fdf0d8; }

  /* layout: table + detail */
  .work{ display:grid; grid-template-columns:1fr 480px; gap:18px; padding:2px 28px 24px; align-items:start; min-width:0; }
  .table-card{ background:var(--surface); border:1px solid var(--line); border-radius:16px; box-shadow:var(--shadow-md); overflow:hidden; min-width:0; }
  .table-scroll{ overflow-x:auto; }
  table{ border-collapse:collapse; width:100%; min-width:1180px; font-size:13px; }
  thead th{ position:sticky; top:0; background:#fafbfd; text-align:left; padding:13px 14px; font-size:12px; font-weight:700; color:var(--ink-3); white-space:nowrap; border-bottom:1px solid var(--line); }
  tbody td{ padding:13px 14px; border-bottom:1px solid var(--line-soft); white-space:nowrap; color:var(--ink-2); }
  tbody tr{ cursor:pointer; transition:background .12s; }
  tbody tr:hover{ background:#fafbff; }
  tbody tr.sel{ background:var(--primary-soft); }
  tbody tr:last-child td{ border-bottom:none; }
  .nm-cell{ font-weight:700; color:var(--ink); }
  .score{ display:inline-flex; align-items:center; justify-content:center; min-width:30px; height:24px; padding:0 8px; border-radius:7px; font-weight:800; font-size:12.5px; }
  .sc-hi{ background:#e7f6ee; color:#0f9d63; } .sc-mid{ background:#e7f0fb; color:#1452a0; } .sc-lo{ background:#f1f3f7; color:#9298a8; }
  .tag{ display:inline-flex; align-items:center; gap:6px; padding:3px 9px; border-radius:7px; font-size:12px; font-weight:600; }
  .tag .d{ width:7px; height:7px; border-radius:50%; }
  .tg-vote{ background:#e7f6ee; color:#0f9d63;} .tg-old{ background:#e8f1fe; color:#2563eb;} .tg-new{ background:#f1ebfd; color:#7c3aed;} .tg-out{ background:#fdeaea; color:#dc2626;} .tg-err{ background:#fdf0e0; color:#cd7d18;}
  .muted-cell{ color:var(--ink-4); }
  .ico-cell{ display:inline-flex; gap:6px; }
  .mini-ico{ width:28px; height:28px; border-radius:8px; display:flex; align-items:center; justify-content:center; background:var(--line-soft); color:var(--ink-3); transition:background .14s,color .14s; }
  .mini-ico:hover{ background:var(--primary-soft); color:var(--primary); }

  .table-foot{ display:flex; align-items:center; justify-content:space-between; padding:13px 18px; border-top:1px solid var(--line); background:#fafbfd; font-size:13px; }
  .tf-left{ color:var(--ink-2); font-weight:600; }
  .tf-left b{ color:var(--primary); }
  .pager{ display:flex; gap:4px; }
  .pg{ min-width:30px; height:30px; border-radius:8px; border:1px solid var(--line); background:var(--surface); font-size:12.5px; font-weight:600; color:var(--ink-2); display:flex; align-items:center; justify-content:center; cursor:pointer; }
  .pg.active{ background:var(--primary); color:#fff; border-color:var(--primary); }

  /* detail panel */
  .detail{ background:var(--surface); border:1px solid var(--line); border-radius:16px; box-shadow:var(--shadow-panel); position:sticky; top:18px; overflow:hidden; }
  .dt-head{ display:flex; align-items:center; gap:11px; padding:18px 20px 0; }
  .dt-ava{ width:42px; height:42px; border-radius:12px; background:linear-gradient(140deg,#2f74c9,#0e3f80); color:#fff; display:flex; align-items:center; justify-content:center; font-size:17px; font-weight:700; }
  .dt-head h2{ font-size:16px; font-weight:800; }
  .dt-head .dt-sub{ font-size:12px; color:var(--ink-3); margin-top:3px; font-weight:500; }
  .tabs{ display:flex; gap:4px; padding:16px 20px 0; border-bottom:1px solid var(--line); }
  .tab{ padding:9px 4px; margin-right:14px; font-size:13.5px; font-weight:700; color:var(--ink-3); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px; transition:color .14s; }
  .tab.active{ color:var(--primary); border-bottom-color:var(--primary); }
  .dt-body{ padding:18px 20px 14px; max-height:calc(100vh - 290px); overflow-y:auto; }
  .grp-label{ font-size:11.5px; font-weight:700; color:var(--ink-3); letter-spacing:.02em; margin:18px 0 10px; }
  .grp-label:first-child{ margin-top:0; }
  .field{ margin-bottom:11px; }
  .field label{ display:block; font-size:12px; font-weight:600; color:var(--ink-2); margin-bottom:5px; }
  .field label .req{ color:#ef4444; }
  .field input, .field select{ width:100%; border:1px solid var(--line); border-radius:10px; padding:10px 12px; font-family:inherit; font-size:13px; color:var(--ink); background:var(--surface); outline:none; transition:border-color .14s,box-shadow .14s; }
  .field input::placeholder{ color:var(--ink-4); }
  .field input:focus, .field select:focus{ border-color:var(--primary); box-shadow:0 0 0 3px var(--primary-soft); }
  .field.row2{ display:grid; grid-template-columns:1fr auto; gap:8px; align-items:end; }
  .field.row2 .btn{ padding:10px 14px; }
  .field-hint{ font-size:11px; color:var(--ink-4); margin-top:5px; font-weight:500; }

  .dt-foot{ display:flex; gap:8px; padding:13px 18px; border-top:1px solid var(--line); background:#fafbfd; }
  .dt-foot .btn{ flex:1; justify-content:center; }
  .ico-btn{ width:40px; height:40px; flex:0 0 auto !important; border-radius:11px; }
  .btn.save{ background:var(--primary); border-color:var(--primary); color:#fff; }
  .btn.save:hover{ background:var(--primary-600); }
  .btn.add{ background:#0f9d63; border-color:#0f9d63; color:#fff; }
  .btn.add:hover{ background:#0c8a56; }
  .btn.del{ background:#fff; border-color:#f3d2d2; color:#dc2626; }
  .btn.del:hover{ background:#fdf0f0; }

  @media (max-width:1280px){ .work{ grid-template-columns:1fr; } .detail{ position:static; } }
  @media (max-width:1080px){ .app, .app.collapsed{ grid-template-columns:1fr; } .sidebar{ display:none; } .page-head,.chips,.toolbar,.work{ padding-left:16px; padding-right:16px; } }
  /* notices */
  .ro-banner{ display:flex; align-items:center; gap:9px; margin:16px 28px 0; padding:12px 16px; background:#fff8ec; border:1px solid #f6e3bf; border-radius:12px; color:#9a6a12; font-size:13px; font-weight:600; }
  .ro-banner svg{ color:#cd7d18; flex-shrink:0; }
  .nlist{ display:flex; flex-direction:column; gap:11px; }
  .ncard{ background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:18px 20px; cursor:pointer; box-shadow:var(--shadow-sm); transition:box-shadow .15s,border-color .15s,transform .12s; }
  .ncard.imp{ background:#fffaf0; border-color:#f1e2c0; }
  .recent-pill{ display:inline-block; background:#ecfdf5; color:#059669; font-size:11px; font-weight:700; padding:1px 6px; border-radius:6px; margin-left:4px; vertical-align:middle; }
  .ncard:hover{ box-shadow:var(--shadow-md); transform:translateY(-1px); }
  .ncard.sel{ border-color:var(--primary); box-shadow:0 0 0 3px var(--primary-soft); }
  .ncard .nt{ font-size:15.5px; font-weight:700; color:var(--ink); display:flex; align-items:center; gap:8px; }
  .ncard .new-dot{ width:7px; height:7px; border-radius:50%; background:#ef4444; flex-shrink:0; }
  .ncard .nmeta{ font-size:12.5px; color:var(--ink-2); font-weight:600; margin-top:9px; display:flex; align-items:center; gap:8px; }
  .ncard .nprev{ font-size:13px; color:var(--ink-3); margin-top:9px; line-height:1.55; display:-webkit-box; -webkit-line-clamp:1; -webkit-box-orient:vertical; overflow:hidden; }
  .author-pill{ display:inline-flex; align-items:center; gap:5px; padding:2px 9px; border-radius:20px; background:#15182a; color:#fff; font-size:11px; font-weight:700; white-space:nowrap; }
  .author-pill.central{ background:var(--primary); }
  .author-pill.gyeonggi{ background:#0d9488; }
  .author-pill.council{ background:#b45309; }
  .cat-pill{ display:inline-flex; align-items:center; padding:2px 8px; border-radius:20px; background:var(--primary-soft); color:var(--primary); font-size:11px; font-weight:700; }
  .imp-pill{ display:inline-flex; align-items:center; padding:2px 8px; border-radius:20px; background:#fdecec; color:#dc2626; font-size:11px; font-weight:700; }
  .nviews{ margin-left:auto; color:var(--ink-4); font-size:12px; }
  .nfilter{ display:flex; gap:8px; margin:18px 28px 6px; }
  .ncol{ min-width:0; }

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDocs, collection } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const _app = initializeApp({apiKey:"AIzaSyAIjhvbCztHoF7YwP2IYIk2C6jCI64uFhs",authDomain:"jjj2195-1bd15.firebaseapp.com",projectId:"jjj2195-1bd15",storageBucket:"jjj2195-1bd15.firebasestorage.app",messagingSenderId:"370852437825",appId:"1:370852437825:web:b0a891d6a99b426d230bc0"});
const _auth = getAuth(_app);
const _dbN = getFirestore(_app);
onAuthStateChanged(_auth, async function(user){
  if(!user){ sessionStorage.removeItem('moida_auth_user'); location.href='index.html'; return; }
  var _prev=JSON.parse(sessionStorage.getItem('moida_auth_user')||'{}');
  if(_prev.uid && _prev.uid!==user.uid){ sessionStorage.setItem('moida_auth_user', JSON.stringify({uid:user.uid, email:user.email, displayName:user.displayName||''})); location.reload(); return; }
  sessionStorage.setItem('moida_auth_user', JSON.stringify({uid:user.uid, email:user.email, displayName:user.displayName||''}));
  try{ await setDoc(doc(_dbN,'moida_auth_users',user.uid),{uid:user.uid,email:user.email||'',displayName:user.displayName||'',lastLogin:Date.now(),provider:(user.providerData&&user.providerData[0]?user.providerData[0].providerId:'')},{merge:true}); }catch(e){}

  if(el){
    el.innerHTML='<div style="font-weight:700;color:var(--ink-2);font-size:13px;padding:2px 10px 1px">'+(user.displayName||'')+'</div>'
      +'<div style="font-size:11.5px;color:var(--ink-3);padding:0 10px 6px;word-break:break-all">'+(user.email||'')+'</div>';
  }
  // 총관리자 콘솔에서 작성한 MOIDA 공지(admin_notices)를 불러와 'MOIDA 공지'에 반영
  try{
    var _snap = await getDocs(collection(_dbN,'admin_notices'));
    var _arr=[];
    _snap.forEach(function(d){ var x=d.data(); var ms=+(x.created||0); var dt=new Date(ms);
      var ds=isNaN(dt.getTime())?'':dt.getFullYear()+'.'+String(dt.getMonth()+1).padStart(2,'0')+'.'+String(dt.getDate()).padStart(2,'0');
      _arr.push({ id:'admin_'+(x.id||d.id), src:'admin', title:x.title||'', date:ds, isNew:(Date.now()-ms<7*86400000), body:x.body||'', files:Array.isArray(x.files)?x.files:[] });
    });
    try{ localStorage.setItem('moida_admin_notices', JSON.stringify(_arr)); }catch(e){}
    if(window._applyAdminNotices) window._applyAdminNotices(_arr);
  }catch(e){ console.warn('admin_notices load fail', e); }
});

    var imp = line.charAt(0)==="*"; if(imp) line=line.slice(1);
    var p = line.split("|"); var no = p[0];
    return { id:+no, src:"gyeonggi", cat:CATMAP[p[1]]||"일반", imp:imp, title:p[4], date:p[2], views:p[3], link:gv(no),
      bodyHtml:null, atts:null,
      body:("더불어민주당 경기도당 공지사항입니다.\n\n"+p[4]+"\n\n자세한 내용과 첨부 파일은 아래 '경기도당 원문 보기'에서 확인해 주세요.") };
  });

  // 경기도의회 공지사항 (ggc.go.kr) — 형식: id|date|views|title  (앞 * = 중요)
  // ※ 외부 수집 차단 — 자동 갱신은 서버 수집기가 src:"council" 로 채워야 함. 아래는 실제 공지 시드.
  const COUNCIL_RAW = `
*c5|2026.06.04|1,210|2026년 상반기 의정발전기여상 후보자 공개검증 실시
c4|2026.06.05|842|경기도의회 광고 및 홍보 운영에 관한 조례안 입법예고
c3|2026.05.20|1,036|경기도의회 사무처 공무원(전문경력관) 경력경쟁 임용시험 공고
c2|2026.04.16|1,489|제389회 경기도의회 임시회 회기 및 의사일정 안내
c1|2026.03.10|2,051|경기도의회 의정모니터단 모집 공고`;
  function cv(){ return "https://www.ggc.go.kr/site/main/board/pblcntc/list"; }
  const councilNotices = COUNCIL_RAW.trim().split("\n").map(function(line){
    var imp = line.charAt(0)==="*"; if(imp) line=line.slice(1);
    var p = line.split("|");
    return { id:p[0], src:"council", cat:null, imp:imp, title:p[3], date:p[1], views:p[2], link:cv(),
      bodyHtml:null, atts:null,
      body:("경기도의회 공지사항입니다.\n\n"+p[3]+"\n\n자세한 내용과 첨부 파일은 아래 '경기도의회 원문 보기'에서 확인해 주세요.") };
  });

  // 날짜 내림차순 정렬 후 합치기
  function dnum(d){ return +d.replace(/\D/g,""); }
  let notices = adminNotices.concat(centralNotices).concat(gyeonggiNotices).concat(councilNotices).sort(function(a,b){ return dnum(b.date)-dnum(a.date); });
  function saveNoticesCache(){ try{ var _nUid=(function(){ try{ return JSON.parse(sessionStorage.getItem('moida_auth_user')||'{}').uid||'default'; }catch(e){ return 'default'; } })(); localStorage.setItem('moida_notices_cache_'+_nUid, JSON.stringify(notices.map(function(n){ return {title:n.title,date:n.date,src:n.src,isNew:n.isNew||false,body:(n.body||'').slice(0,120)}; }))); }catch(e){} }
  saveNoticesCache();

  // 총관리자 콘솔의 MOIDA 공지(admin_notices)로 'admin' 출처 공지를 교체
  // 공지사항 페이지를 봤으므로 전체 공지를 읽음 처리 + 뱃지 갱신
  function _syncNoticeBadge(){ if(window.setNoticesAll){ setNoticesAll(notices.map(function(n){ return n.date; })); markNoticesRead(); updateNoticeBadge(); } }
  window._applyAdminNotices = function(list){
    if(!Array.isArray(list)) return;
    notices = notices.filter(function(n){ return n.src!=='admin'; }).concat(list).sort(function(a,b){ return dnum(b.date)-dnum(a.date); });
    saveNoticesCache();
    renderList();
    _syncNoticeBadge();
  };
  // 캐시된 MOIDA 공지를 즉시 반영(새로고침 깜빡임 방지) → Firestore가 곧 갱신
  try{ var _adminCache=JSON.parse(localStorage.getItem('moida_admin_notices')||'[]'); if(Array.isArray(_adminCache)&&_adminCache.length) window._applyAdminNotices(_adminCache); }catch(e){}

  const SRC = {
    admin:    { label:"총관리자", cls:"" },
    central:  { label:"민주당 중앙당", cls:"central" },
    gyeonggi: { label:"경기도당", cls:"gyeonggi" },
    council:  { label:"경기도의회", cls:"council" }
  };
  function srcPill(n){ const m=SRC[n.src]||SRC.admin; return '<span class="author-pill '+m.cls+'">'+m.label+'</span>'+(n.imp?'<span class="imp-pill">중요</span>':'')+(n.cat?'<span class="cat-pill">'+n.cat+'</span>':''); }

  const nlist = document.getElementById('nlist');
  const ndTitle = document.getElementById('ndTitle');
  const ndMeta = document.getElementById('ndMeta');
  const ndBody = document.getElementById('ndBody');
  let curFilter = 'all';

  function isRecent(d){ if(!d) return false; var s=d.replace(/\./g,'-').replace(/[^0-9\-]/g,''); var dt=new Date(s); return !isNaN(dt)&&(Date.now()-dt.getTime()<30*24*60*60*1000); }
  function renderList(){
    var filtered = notices.filter(n=> curFilter==='all' || n.src===curFilter);
    // 전체 탭은 날짜순만, 나머지 탭은 중요공지 상단 + 날짜순
    var items;
    if(curFilter==='all'){
      items = filtered.slice().sort(function(a,b){ return dnum(b.date)-dnum(a.date); });
    } else {
      var imp = filtered.filter(function(n){ return n.imp; }).sort(function(a,b){ return dnum(b.date)-dnum(a.date); });
      var rest = filtered.filter(function(n){ return !n.imp; }).sort(function(a,b){ return dnum(b.date)-dnum(a.date); });
      items = imp.concat(rest);
    }
    nlist.innerHTML = items.map((n)=>`
      <div class="ncard${n.imp?' imp':''}" data-id="${n.id}">
        <div class="nt">${n.isNew?'<span class="new-dot"></span>':''}${esc(n.title)}</div>
        <div class="nmeta">${srcPill(n)}<span>${n.date}</span>${isRecent(n.date)?'<span class="recent-pill">최근</span>':''}${n.views?'<span class="nviews">'+n.views+'회</span>':''}</div>
        <div class="nprev">${esc(n.body.replace(/\s+/g,' ').trim())}</div>
      </div>`).join('') || '<div style="padding:40px 4px;color:var(--ink-4);font-size:14px;">해당 출처의 공지가 없습니다.</div>';
    nlist.querySelectorAll('.ncard').forEach(c=>c.addEventListener('click',()=>selectNotice(c.dataset.id)));
    // counts
    document.querySelector('[data-c="all"]').textContent = notices.length;
    document.querySelector('[data-c="admin"]').textContent = notices.filter(n=>n.src==='admin').length;
    document.querySelector('[data-c="central"]').textContent = notices.filter(n=>n.src==='central').length;
    document.querySelector('[data-c="gyeonggi"]').textContent = notices.filter(n=>n.src==='gyeonggi').length;
    document.querySelector('[data-c="council"]').textContent = notices.filter(n=>n.src==='council').length;
    const first = items[0]; if(first) selectNotice(first.id);
  }

  function selectNotice(id){
    const n = notices.find(x=>String(x.id)===String(id)); if(!n) return;
    nlist.querySelectorAll('.ncard').forEach(c=>c.classList.remove('sel'));
    const card = nlist.querySelector('.ncard[data-id="'+id+'"]');
    if(card) card.classList.add('sel');
    ndTitle.textContent = n.title;
    ndMeta.innerHTML = srcPill(n)+'<span>'+n.date+'</span>'+(n.views?'<span class="nviews">'+n.views+'회</span>':'');
    var extLabel = n.src==='gyeonggi' ? '경기도당 원문 보기' : (n.src==='council' ? '경기도의회 원문 보기' : '중앙당 원문 보기');
    var srcLink = ((n.src==='central'||n.src==='gyeonggi'||n.src==='council') && n.link)
      ? '<a class="src-link" href="'+n.link+'" target="_blank" rel="noopener"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1 1"/><path d="M14 11a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1-1"/></svg>'+extLabel+'</a>'
      : '';
    if(n.bodyHtml){
      var atts = (n.atts && n.atts.length)
        ? '<div class="atts">'+n.atts.map(function(a){ return '<a class="att" href="'+a.url+'" target="_blank" rel="noopener"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2v6h6"/><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg>'+a.name+'</a>'; }).join('')+'</div>'
        : '';
      ndBody.className = 'db';
      ndBody.innerHTML = n.bodyHtml + atts + (srcLink? '<div class="atts">'+srcLink+'</div>' : '');
    } else if((n.src==='central'||n.src==='gyeonggi'||n.src==='council') && n.link){
      ndBody.className = 'db plain';
      ndBody.innerHTML = n.body.replace(/</g,'&lt;').replace(/\n/g,'<br>') + '<br><br>' + srcLink;
    } else {
      ndBody.className = 'db plain';
      ndBody.textContent = n.body;
    }
  }

  document.querySelectorAll('.nftab').forEach(t=>t.addEventListener('click',function(){
    document.querySelectorAll('.nftab').forEach(x=>x.classList.remove('on'));
    this.classList.add('on');
    curFilter = this.dataset.src;
    renderList();
  }));
  (function(){
    var sp=new URLSearchParams(location.search).get('src');
    var valid=['all','admin','central','gyeonggi','council'];
    if(sp && valid.indexOf(sp)>=0){
      curFilter=sp;
      document.querySelectorAll('.nftab').forEach(function(x){ x.classList.toggle('on', x.dataset.src===sp); });
    }
  })();
  renderList();

  // JSON 파일에서 경기도당/중앙당/경기도의회 공지 자동 로딩
  (function(){
    function mapItem(item, src, idPrefix){
      var imp = item.category==='공지';
      var cat = (item.category && item.category!=='공지') ? item.category : null;
      var d = (item.date||'').replace(/\//g,'.').replace(/-/g,'.');
      return { id: idPrefix+(item.link||item.title||Math.random()).toString().replace(/\W/g,'').slice(-8),
        src:src, cat:cat, imp:imp, title:item.title||'', date:d, views:'', link:item.link||'',
        bodyHtml:null, atts:null,
        body:(src==='gyeonggi'?'더불어민주당 경기도당':src==='central'?'더불어민주당 중앙당':'경기도의회')+' 공지사항입니다.\n\n'+(item.title||'')+"\n\n자세한 내용은 아래 원문 보기에서 확인해 주세요." };
    }
    Promise.allSettled([
      fetch('notices_data.json').then(function(r){ return r.json(); }),
      fetch('central_data.json').then(function(r){ return r.json(); }),
      fetch('council_data.json').then(function(r){ return r.json(); })
    ]).then(function(results){
      var changed = false;
      var gy = results[0]; var ct = results[1]; var co = results[2];
      if(gy.status==='fulfilled' && gy.value && gy.value.items && gy.value.items.length){
        var fetched = gy.value.items.map(function(it){ return mapItem(it,'gyeonggi','gy'); });
        notices = notices.filter(function(n){ return n.src!=='gyeonggi'; }).concat(fetched);
        changed = true;
      }
      if(ct.status==='fulfilled' && ct.value && ct.value.items && ct.value.items.length){
        var fetched = ct.value.items.map(function(it){ return mapItem(it,'central','ct'); });
        notices = notices.filter(function(n){ return n.src!=='central'; }).concat(fetched);
        changed = true;
      }
      if(co.status==='fulfilled' && co.value && co.value.items && co.value.items.length){
        var fetched = co.value.items.map(function(it){ return mapItem(it,'council','co'); });
        notices = notices.filter(function(n){ return n.src!=='council'; }).concat(fetched);
        changed = true;
      }
      if(changed){
        notices.sort(function(a,b){ return dnum(b.date)-dnum(a.date); });
        saveNoticesCache();
        renderList();
      }
      _syncNoticeBadge();
    });
  })();

  // sidebar collapse
  (function(){
    const app=document.querySelector('.app'); const KEY='moida_sidebar_collapsed';
    if(localStorage.getItem(KEY)==='1') app.classList.add('collapsed');
    document.querySelectorAll('.nav-item').forEach(n=>{ const t=n.querySelector('.nm'); if(t) n.setAttribute('data-tip', t.textContent.trim()); });
    document.querySelectorAll('.foot-item').forEach(n=>{ const t=n.querySelector('span'); if(t) n.setAttribute('data-tip', t.textContent.trim()); });
    document.querySelectorAll('[data-collapse]').forEach(b=>b.addEventListener('click',()=>{
      app.classList.toggle('collapsed');
      localStorage.setItem(KEY, app.classList.contains('collapsed')?'1':'0');
    }));
    (function(){ var lg=document.querySelector('.logo'); if(!lg) return;
      lg.addEventListener('click',function(e){
        if(app.classList.contains('collapsed')){ e.preventDefault(); e.stopPropagation(); app.classList.remove('collapsed'); localStorage.setItem(KEY,'0'); }
        else { location.href='dashboard.html'; }
      });
    })();
  })();
</script>
<script>
/* ===== 바로가기 (공유) ===== */
(function(){
  var OPTS=[
    { key:'all',      label:'전체 공지',      color:'#64748b', href:'notices.html' },
    { key:'admin',    label:'MOIDA 공지',     color:'#15182a', href:'notices.html?src=admin' },
    { key:'central',  label:'민주당 중앙당',   color:'#1452a0', href:'notices.html?src=central' },
    { key:'gyeonggi', label:'민주당 경기도당', color:'#0d9488', href:'notices.html?src=gyeonggi' },
    { key:'council',  label:'경기도의회',      color:'#b45309', href:'notices.html?src=council' }
  ];
  var _scUid=(function(){ try{ return JSON.parse(sessionStorage.getItem('moida_auth_user')||'{}').uid||'default'; }catch(e){ return 'default'; } })();
  var KEY='moida_shortcuts_'+_scUid;
  function get(){ try{ return JSON.parse(localStorage.getItem(KEY)||'[]'); }catch(e){ return []; } }
  function save(a){ localStorage.setItem(KEY, JSON.stringify(a)); }
  var nav=document.querySelector('.sidebar nav'); if(!nav) return;
  if(!document.getElementById('scSharedStyle')){
    var st=document.createElement('style'); st.id='scSharedStyle';
    st.textContent='.sc-sec{margin-top:10px;padding-top:10px;border-top:1px solid var(--line-soft);}'+
      '.sc-head{display:flex;align-items:center;padding:6px 10px;font-size:11px;font-weight:700;letter-spacing:.04em;color:var(--ink-3);}'+
      '.sc-item{display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:11px;cursor:pointer;color:var(--ink-2);font-size:13.5px;font-weight:600;text-decoration:none;}'+
      '.sc-item:hover{background:var(--line-soft);color:var(--ink);}'+
      '.sc-dot{width:9px;height:9px;border-radius:3px;flex-shrink:0;}'+
      '.sc-item .nm{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}'+
      '.sc-del{width:20px;height:20px;border:none;background:none;color:var(--ink-3);display:none;align-items:center;justify-content:center;cursor:pointer;border-radius:6px;flex-shrink:0;}'+
      '.sc-item:hover .sc-del{display:flex;} .sc-del:hover{background:#fde8e8;color:#dc2626;}'+
      '.app.collapsed .sc-head{display:none;} .app.collapsed .sc-item{justify-content:center;gap:0;padding:10px 0;}'+
      '.app.collapsed .sc-item .nm,.app.collapsed .sc-del{display:none;}';
    document.head.appendChild(st);
  }
  var sec=document.createElement('div'); sec.className='sc-sec'; sec.id='scSec'; sec.style.display='none';
  sec.innerHTML='<div class="sc-head"><span>바로가기</span></div><div id="scList"></div>';
  nav.appendChild(sec);
  var list=sec.querySelector('#scList');
  function render(){
    var keys=get(); var items=OPTS.filter(function(o){ return keys.indexOf(o.key)>=0; });
    if(!items.length){ sec.style.display='none'; list.innerHTML=''; return; }
    sec.style.display='block';
    list.innerHTML=items.map(function(o){
      return '<a class="sc-item" href="'+o.href+'" data-tip="'+o.label+'"><span class="sc-dot" style="background:'+o.color+'"></span><span class="nm">'+o.label+'</span><button class="sc-del" data-key="'+o.key+'" title="삭제"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M6 6l12 12M18 6 6 18"/></svg></button></a>';
    }).join('');
    list.querySelectorAll('.sc-del').forEach(function(b){
      b.addEventListener('click', function(e){ e.preventDefault(); e.stopPropagation(); var k=b.dataset.key; save(get().filter(function(x){return x!==k;})); render(); });
    });
  }
  render();
  window.addEventListener('storage', function(e){ if(e.key===KEY) render(); });
})();

  // 로그인 계정 표시
  (function(){
    try{
      var u=JSON.parse(sessionStorage.getItem('moida_auth_user')||localStorage.getItem('moida_auth_user')||'{}');
      var el=document.getElementById('sideFootUser');
      if(el&&(u.displayName||u.email)){
        el.innerHTML='<div style="font-weight:700;color:var(--ink-2);font-size:13px;padding:2px 10px 1px">'+(u.displayName||'')+'</div>'
          +'<div style="font-size:11.5px;color:var(--ink-3);padding:0 10px 6px;word-break:break-all">'+(u.email||'')+'</div>';
      }
    }catch(e){}
  })();
</script>
<script src="notice-badge.js"></script>
</body>
</html>
