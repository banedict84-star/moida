<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>가죽공예 단체수업 신청 · 견적 바로받기</title>
<meta property="og:title" content="가죽공예 단체수업 신청">
<meta property="og:description" content="인원·품목만 입력하면 견적서를 바로 메일로 보내드려요.">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  :root{--bg:#f3efe9;--card:#fff;--ink:#2a221d;--sub:#94867b;--line:#e0d6c9;
    --brand:#7a4f2c;--brand2:#9c6736;--accent:#c9a26a;--ok:#3f7d4e;}
  *{box-sizing:border-box}
  body{margin:0;font-family:"Pretendard",-apple-system,sans-serif;background:linear-gradient(180deg,#f3efe9,#ece5db);
    color:var(--ink);letter-spacing:-.015em;-webkit-font-smoothing:antialiased;min-height:100vh}
  .hero{background:linear-gradient(120deg,#6c4525,var(--brand) 50%,var(--brand2));color:#fff;
    padding:34px 22px 30px;text-align:center;position:relative;overflow:hidden}
  .hero::after{content:"";position:absolute;right:-50px;top:-50px;width:200px;height:200px;
    background:radial-gradient(circle,rgba(255,255,255,.1),transparent 70%);border-radius:50%}
  .hero .emoji{font-size:40px}
  .hero h1{font-size:24px;margin:10px 0 6px;font-weight:800;letter-spacing:-.04em}
  .hero p{margin:0;opacity:.9;font-size:14px;line-height:1.5}
  .wrap{max-width:560px;margin:0 auto;padding:20px 16px 60px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:22px;margin:-26px 0 16px;
    box-shadow:0 8px 30px rgba(60,40,20,.1);position:relative;z-index:2}
  label{display:block;font-size:13px;font-weight:700;color:#5b4f45;margin:14px 0 6px}
  label .req{color:#b4513f}
  input,select,textarea{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:12px;
    font-size:15px;font-family:inherit;background:#fdfcfb;color:var(--ink);transition:.15s}
  input:focus,select:focus,textarea:focus{outline:0;border-color:var(--accent);box-shadow:0 0 0 3px rgba(201,162,106,.18);background:#fff}
  textarea{resize:vertical;min-height:70px;line-height:1.5}
  .two{display:flex;gap:10px}.two>div{flex:1}
  .estimate{background:#faf6f0;border:1px solid var(--line);border-left:4px solid var(--accent);
    border-radius:12px;padding:14px 16px;margin-top:18px}
  .estimate .t{font-size:12.5px;color:var(--sub);font-weight:700}
  .estimate .v{font-size:26px;font-weight:800;color:var(--brand);letter-spacing:-.03em;margin-top:2px}
  .estimate .d{font-size:12px;color:var(--sub);margin-top:4px}
  .btn{width:100%;border:0;background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;
    padding:16px;border-radius:14px;font-size:16px;font-weight:800;cursor:pointer;margin-top:20px;
    box-shadow:0 4px 14px rgba(122,79,44,.3);transition:.15s}
  .btn:hover{filter:brightness(1.07);transform:translateY(-1px)}
  .btn:disabled{opacity:.6;cursor:default;transform:none}
  .trust{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:16px}
  .trust span{font-size:12px;background:#f3ece3;color:var(--brand);padding:6px 12px;border-radius:20px;font-weight:600}
  .done{text-align:center;padding:30px 10px}
  .done .ck{width:64px;height:64px;border-radius:50%;background:#e9f3ec;color:var(--ok);font-size:34px;
    display:flex;align-items:center;justify-content:center;margin:0 auto 14px}
  .done h2{margin:0 0 8px;font-size:20px}
  .done p{color:var(--sub);font-size:14px;line-height:1.6;margin:0}
  .foot{text-align:center;color:var(--sub);font-size:12px;margin-top:20px;line-height:1.6}
  .err{background:#fdecea;color:#b4513f;border-radius:10px;padding:10px 12px;font-size:13px;margin-top:12px;display:none}
</style>
</head>
<body>
  <div class="hero">
    <div class="emoji">🧵</div>
    <h1>가죽공예 단체수업 신청</h1>
    <p>인원·품목만 입력하면<br>견적서를 바로 이메일로 보내드려요</p>
  </div>
  <div class="wrap">
    <div class="card" id="form-card">
      <form id="form" onsubmit="submitForm(event)">
        <label>단체/기관명 <span class="req">*</span></label>
        <input id="org" required placeholder="예: 햇살초등학교 / ○○기업 / 친구모임">
        <div class="two">
          <div><label>담당자 <span class="req">*</span></label><input id="mgr" required placeholder="이름"></div>
          <div><label>연락처 <span class="req">*</span></label><input id="contact" required placeholder="010-0000-0000"></div>
        </div>
        <label>이메일 <span class="req">*</span> <span style="font-weight:500;color:#94867b">(견적서 받을 주소)</span></label>
        <input id="email" type="email" required placeholder="example@email.com">
        <div class="two">
          <div><label>인원수 <span class="req">*</span></label><input id="people" type="number" required min="1" placeholder="30" oninput="estimate()"></div>
          <div><label>희망 날짜</label><input id="date" type="date"></div>
        </div>
        <label>만들 품목 <span class="req">*</span></label>
        <select id="item" onchange="estimate()"></select>
        <label>장소(지역)</label>
        <input id="loc" placeholder="예: 경기 수원시">
        <label>요청사항 (선택)</label>
        <textarea id="memo" placeholder="원하시는 점을 자유롭게 적어주세요"></textarea>

        <div class="estimate" id="est" style="display:none">
          <div class="t">예상 견적 (VAT 별도)</div>
          <div class="v" id="est-v">-</div>
          <div class="d" id="est-d"></div>
        </div>

        <div class="err" id="err"></div>
        <button class="btn" id="submit-btn" type="submit">📩 신청하고 견적서 받기</button>
        <div class="trust">
          <span>✓ 견적서 즉시 발송</span><span>✓ 세금계산서 가능</span><span>✓ 재료·강사 포함</span>
        </div>
      </form>
    </div>
    <div class="foot">문의 주신 정보는 견적 안내 목적으로만 사용됩니다.</div>
  </div>

<script>
  // ▼▼▼ 연결 설정 (앱스크립트 배포 후 이 주소만 바꾸세요) ▼▼▼
  const ENDPOINT = "PASTE_YOUR_APPS_SCRIPT_URL_HERE";
  // ▲▲▲ 위 따옴표 안에 앱스크립트 웹앱 URL 붙여넣기 ▲▲▲

  // 견적 기준 (도구의 '단가 설정'과 동일하게 맞추세요)
  const PRICES = [
    {name:'키링/팔찌', kit:8000, fee:12000},
    {name:'카드지갑', kit:12000, fee:18000},
    {name:'반지갑', kit:20000, fee:25000},
    {name:'장지갑', kit:35000, fee:35000},
    {name:'에코백/토트백', kit:40000, fee:40000},
  ];
  const CFG = {perteacher:15, travel:50000};
  const won = n => (Math.round(n)||0).toLocaleString('ko-KR')+'원';

  // 품목 채우기
  document.getElementById('item').innerHTML = PRICES.map(p=>`<option>${p.name}</option>`).join('');

  function calc(people, itemName){
    const p = PRICES.find(x=>x.name===itemName)||PRICES[0];
    people = +people||0;
    const need = Math.max(1, Math.ceil(people/CFG.perteacher));
    const total = p.kit*people + p.fee*people + need*CFG.travel;
    return {total, need};
  }
  function estimate(){
    const people = document.getElementById('people').value;
    const item = document.getElementById('item').value;
    const box = document.getElementById('est');
    if(!people || +people<1){ box.style.display='none'; return; }
    const q = calc(people, item);
    box.style.display='block';
    document.getElementById('est-v').textContent = won(q.total);
    document.getElementById('est-d').textContent = `${item} · ${people}명 · 강사 ${q.need}명 (재료·강사 출장 포함). 정확한 견적은 메일로 보내드려요.`;
  }

  async function submitForm(e){
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    const err = document.getElementById('err');
    err.style.display='none';
    const data = {
      org:org.value.trim(), mgr:mgr.value.trim(), contact:contact.value.trim(),
      email:email.value.trim(), people:people.value, date:date.value,
      item:item.value, loc:loc.value.trim(), memo:memo.value.trim(),
      estimate: calc(people.value, item.value).total
    };
    if(ENDPOINT.includes("PASTE_YOUR")){
      err.textContent = "⚠️ 아직 연결 설정 전이에요. (앱스크립트 URL을 넣어주세요)";
      err.style.display='block'; return;
    }
    btn.disabled=true; btn.textContent="보내는 중...";
    try{
      await fetch(ENDPOINT, {method:'POST', mode:'no-cors',
        body:new URLSearchParams(data)});  // no-cors: 응답은 못 읽지만 전송·처리됨
      showDone(data.email);
    }catch(ex){
      err.textContent="전송에 실패했어요. 잠시 후 다시 시도해 주세요."; err.style.display='block';
      btn.disabled=false; btn.textContent="📩 신청하고 견적서 받기";
    }
  }
  function showDone(email){
    document.getElementById('form-card').innerHTML = `
      <div class="done">
        <div class="ck">✓</div>
        <h2>신청이 접수됐어요!</h2>
        <p><b>${email}</b> 으로<br>견적서를 보내드렸어요. 📩<br><br>
        메일이 안 보이면 스팸함도 확인해 주세요.<br>곧 담당자가 연락드릴게요.</p>
      </div>`;
  }
</script>
</body>
</html>
