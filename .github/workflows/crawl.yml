name: 공지사항 크롤링

on:
  schedule:
    - cron: '0 0 * * *'  # 매일 오전 9시 KST (UTC 0시)
  workflow_dispatch:      # 수동 실행 가능

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Playwright 설치
        run: |
          pip install playwright requests
          playwright install chromium --with-deps

      - name: 공지사항 크롤링
        run: |
          python3 - <<'EOF'
          import json, re
          from datetime import datetime
          from playwright.sync_api import sync_playwright

          url = "https://www.minjookg.kr/sub01_news/notice.php"

          with sync_playwright() as p:
              browser = p.chromium.launch(
                  headless=True,
                  args=[
                      "--disable-blink-features=AutomationControlled",
                      "--no-sandbox",
                      "--disable-dev-shm-usage",
                      "--disable-web-security",
                      "--disable-features=IsolateOrigins,site-per-process",
                  ]
              )
              ctx = browser.new_context(
                  user_agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36",
                  viewport={"width": 1280, "height": 800},
                  locale="ko-KR",
                  extra_http_headers={
                      "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8",
                      "Accept-Language": "ko-KR,ko;q=0.9,en-US;q=0.8,en;q=0.7",
                      "Accept-Encoding": "gzip, deflate, br",
                      "Connection": "keep-alive",
                      "Upgrade-Insecure-Requests": "1",
                      "Sec-Fetch-Dest": "document",
                      "Sec-Fetch-Mode": "navigate",
                      "Sec-Fetch-Site": "none",
                      "Sec-Fetch-User": "?1",
                  }
              )

              # Mask automation signals via JS
              ctx.add_init_script("""
                  Object.defineProperty(navigator, 'webdriver', { get: () => undefined });
                  Object.defineProperty(navigator, 'plugins', { get: () => [1, 2, 3, 4, 5] });
                  Object.defineProperty(navigator, 'languages', { get: () => ['ko-KR', 'ko', 'en'] });
                  window.chrome = { runtime: {} };
              """)

              page = ctx.new_page()

              print("페이지 로딩 중...")
              page.goto(url, wait_until="domcontentloaded", timeout=30000)
              page.wait_for_timeout(5000)

              html = page.content()
              print(f"HTML 길이: {len(html)}")
              print("=== HTML 앞부분 ===")
              print(html[:2000])
              print("=== HTML 중간 ===")
              print(html[2000:4000])

              # Try multiple selectors
              notices = []
              selectors_to_try = [
                  ".board-item",
                  ".board-list .board-item",
                  ".brd-list tr",
                  "table tbody tr",
                  "ul.notice li",
                  ".list-item",
                  "article",
                  ".post-item",
                  "[class*='board'] [class*='item']",
                  "[class*='notice'] li",
                  "li[class]",
              ]

              for sel in selectors_to_try:
                  try:
                      items = page.query_selector_all(sel)
                      if items:
                          print(f"선택자 '{sel}': {len(items)}개 발견")
                  except Exception as e:
                      pass

              browser.close()

          result = {
              "updated": datetime.now().strftime("%Y-%m-%d %H:%M UTC"),
              "items": notices
          }

          with open("notices_data.json", "w", encoding="utf-8") as f:
              json.dump(result, f, ensure_ascii=False, indent=2)

          print(f"최종 저장: {len(notices)}건")
          EOF

      - name: 변경사항 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add notices_data.json
          git diff --cached --quiet || git commit -m "chore: 공지사항 데이터 업데이트 $(date +'%Y-%m-%d')"
          git push
