name: 공지사항 크롤링

on:
  schedule:
    - cron: '0 0 * * *'  # 매일 오전 9시 KST (UTC 0시)
  workflow_dispatch:      # 수동 실행 가능

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 패키지 설치
        run: pip install requests beautifulsoup4 lxml

      - name: 공지사항 크롤링
        run: |
          python3 - <<'EOF'
          import json, re
          from datetime import datetime, timezone
          import requests
          from bs4 import BeautifulSoup

          BASE_URL = "https://www.minjookg.kr"
          NOTICE_URL = f"{BASE_URL}/sub01_news/notice.php"

          # corsproxy.io worked in previous test - use it
          proxy_url = f"https://corsproxy.io/?{NOTICE_URL}"
          print(f"Fetching via corsproxy.io: {proxy_url}")

          resp = requests.get(proxy_url, timeout=30, headers={"Origin": "https://corsproxy.io"})
          print(f"Status: {resp.status_code}, 길이: {len(resp.text)}")

          if resp.status_code != 200 or len(resp.text) < 2000:
              print("corsproxy.io 실패, 직접 요청 시도...")
              resp = requests.get(NOTICE_URL, timeout=15, headers={
                  "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36",
                  "Accept-Language": "ko-KR,ko;q=0.9",
              })
              print(f"직접: Status={resp.status_code}, 길이={len(resp.text)}")

          html = resp.text
          print("=== HTML 앞 500자 ===")
          print(html[:500])

          soup = BeautifulSoup(html, "lxml")

          # Debug: print all classes found
          print("\n=== 발견된 클래스들 ===")
          all_classes = set()
          for tag in soup.find_all(class_=True):
              for c in tag.get("class", []):
                  all_classes.add(c)
          print(sorted(all_classes)[:50])

          # Debug: print all links
          print("\n=== 링크들 ===")
          for a in soup.find_all("a", href=True)[:30]:
              href = a.get("href", "")
              txt = a.get_text(strip=True)
              if txt and len(txt) > 3:
                  print(f"  {href} -> {txt[:60]}")

          notices = []

          # Try various selectors to find notice items
          selectors = [
              ".board-item",
              ".brd-list tr",
              "table.board tbody tr",
              "table tbody tr",
              ".notice-list li",
              ".post-list li",
              "ul li[class]",
              ".list-wrap li",
              "[class*='board'] li",
              "[class*='notice'] li",
          ]

          found_sel = None
          for sel in selectors:
              items = soup.select(sel)
              if items and len(items) > 1:
                  print(f"\n선택자 '{sel}': {len(items)}개 발견")
                  print(f"첫 아이템: {str(items[0])[:200]}")
                  found_sel = sel
                  break

          if found_sel:
              items = soup.select(found_sel)
              for item in items:
                  a = item.find("a", href=True)
                  if not a:
                      continue
                  title = a.get_text(strip=True)
                  href = a["href"]
                  if not href.startswith("http"):
                      href = BASE_URL + "/" + href.lstrip("/")
                  # Find date
                  date_el = item.select_one(".date, .brd-date, td:last-child, [class*='date']")
                  date_str = date_el.get_text(strip=True) if date_el else ""
                  # Find category
                  cat_el = item.select_one(".category, .cate, [class*='cate'], [class*='category']")
                  cat = cat_el.get_text(strip=True) if cat_el else "일반"
                  if title and len(title) > 2:
                      notices.append({"title": title, "date": date_str, "link": href, "category": cat})
          else:
              print("\n알려진 선택자로 찾지 못함. 전체 HTML 구조 출력:")
              print(html[500:3000])

          print(f"\n최종 수집: {len(notices)}건")
          for n in notices[:5]:
              print(n)

          now_utc = datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M UTC")
          result = {
              "updated": now_utc,
              "items": notices
          }

          with open("notices_data.json", "w", encoding="utf-8") as f:
              json.dump(result, f, ensure_ascii=False, indent=2)

          print(f"저장 완료: {len(notices)}건")
          EOF

      - name: 변경사항 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add notices_data.json
          git diff --cached --quiet || git commit -m "chore: 공지사항 데이터 업데이트 $(date +'%Y-%m-%d')"
          git push
