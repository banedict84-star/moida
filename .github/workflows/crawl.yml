name: 공지사항 크롤링

on:
  schedule:
    - cron: '0 0 * * *'  # 매일 오전 9시 KST (UTC 0시)
  workflow_dispatch:      # 수동 실행 가능

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python 크롤링
        run: |
          python3 - <<'EOF'
          import urllib.request
          import json
          import re
          from html.parser import HTMLParser

          url = "https://www.minjookg.kr/sub01_news/notice.php"
          headers = {
            "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/124.0 Safari/537.36",
            "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8",
            "Accept-Language": "ko-KR,ko;q=0.9",
            "Referer": "https://www.minjookg.kr/",
          }

          req = urllib.request.Request(url, headers=headers)
          with urllib.request.urlopen(req, timeout=15) as res:
              html = res.read().decode("utf-8", errors="ignore")

          items = re.findall(
              r'class=["\']board-item[^"\']*["\'][^>]*>(.*?)</div>\s*</div>',
              html, re.DOTALL
          )

          notices = []
          for item in items:
              title_m = re.search(r'class=["\'][^"\']*title[^"\']*["\'][^>]*>(.*?)</[^>]+>', item, re.DOTALL)
              if not title_m:
                  title_m = re.search(r'<a[^>]*>(.*?)</a>', item, re.DOTALL)
              title = re.sub(r'<[^>]+>', '', title_m.group(1)).strip() if title_m else ""

              date_m = re.search(r'(\d{4}[-./]\d{2}[-./]\d{2})', item)
              date = date_m.group(1) if date_m else ""

              link_m = re.search(r'href=["\']([^"\']+)["\']', item)
              link = link_m.group(1) if link_m else ""
              if link and not link.startswith("http"):
                  link = "https://www.minjookg.kr" + link

              cat_m = re.search(r'class=["\'][^"\']*category[^"\']*["\'][^>]*>(.*?)</[^>]+>', item, re.DOTALL)
              category = re.sub(r'<[^>]+>', '', cat_m.group(1)).strip() if cat_m else ""

              if title:
                  notices.append({"title": title, "date": date, "link": link, "category": category})

          with open("notices_data.json", "w", encoding="utf-8") as f:
              json.dump({"updated": __import__('datetime').datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC"), "items": notices}, f, ensure_ascii=False, indent=2)

          print(f"수집 완료: {len(notices)}건")
          EOF

      - name: 변경사항 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add notices_data.json
          git diff --cached --quiet || git commit -m "chore: 공지사항 데이터 업데이트 $(date +'%Y-%m-%d')"
          git push
