name: 공지사항 크롤링

on:
  schedule:
    - cron: '0 * * * *'  # 매 시간마다 (하루 24회)
  workflow_dispatch:      # 수동 실행 가능

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 패키지 설치
        run: |
          pip install requests beautifulsoup4 lxml playwright
          python3 -m playwright install chromium --with-deps

      - name: 공지사항 크롤링
        run: |
          python3 - <<'EOF'
          import json, time
          from datetime import datetime, timezone
          import requests
          from bs4 import BeautifulSoup

          now_utc = datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M UTC")

          PROXIES = [
              "https://corsproxy.io/?{url}",
              "https://api.codetabs.com/v1/proxy?quest={url}",
              "https://api.allorigins.win/raw?url={url}",
          ]

          def fetch(url, extra_headers=None):
              headers = {"Origin": "https://corsproxy.io", "User-Agent": "Mozilla/5.0"}
              if extra_headers:
                  headers.update(extra_headers)
              for tmpl in PROXIES:
                  proxy_url = tmpl.format(url=url)
                  try:
                      r = requests.get(proxy_url, timeout=20, headers=headers)
                      if r.status_code == 200 and len(r.content) > 500:
                          print(f"  OK [{r.status_code}] via {proxy_url[:50]}")
                          r.encoding = "utf-8"
                          return r.text
                      print(f"  FAIL [{r.status_code}] via {proxy_url[:50]}")
                  except Exception as e:
                      print(f"  ERROR {e}")
              return None

          # ── 경기도당 (minjookg.kr) ──────────────────────────────────────
          GY_BASE = "https://www.minjookg.kr"
          GY_URL  = f"{GY_BASE}/sub01_news/notice.php"
          GY_PAGES = 4

          def parse_gy(li, category="일반"):
              a = li.select_one("a[href]")
              if not a:
                  return None
              for s in a.select("span.label, span.no"):
                  s.decompose()
              title = a.get_text(strip=True)
              href  = a.get("href", "")
              if not href.startswith("http"):
                  href = GY_BASE + (href if href.startswith("/") else "/" + href)
              date_el  = li.select_one("span.date")
              date_str = date_el.get_text(strip=True).replace("/", "-").strip() if date_el else ""
              return {"title": title, "date": date_str, "link": href, "category": category} if title and len(title) > 2 else None

          gy_notices, gy_seen = [], set()
          for page in range(1, GY_PAGES + 1):
              print(f"\n[경기도당] 페이지 {page}")
              html = fetch(f"{GY_URL}?board_page={page}")
              if not html:
                  continue
              soup = BeautifulSoup(html, "lxml")
              if page == 1:
                  for li in soup.select(".notice ul li"):
                      item = parse_gy(li, "공지")
                      if item and item["link"] not in gy_seen:
                          gy_seen.add(item["link"]); gy_notices.append(item)
              for li in soup.select(".list_A ul li"):
                  item = parse_gy(li, "일반")
                  if item and item["link"] not in gy_seen:
                      gy_seen.add(item["link"]); gy_notices.append(item)
              time.sleep(0.5)

          print(f"\n경기도당 수집: {len(gy_notices)}건")
          with open("notices_data.json", "w", encoding="utf-8") as f:
              json.dump({"updated": now_utc, "items": gy_notices}, f, ensure_ascii=False, indent=2)

          # ── 중앙당 (theminjoo.kr) ───────────────────────────────────────
          from urllib.parse import urljoin

          CT_BASE     = "https://theminjoo.kr"
          CT_URL      = f"{CT_BASE}/main/sub/news/list.php?brd=1"
          CT_PER_PAGE = 20   # 페이지당 항목 수
          CT_PAGES    = 2    # 2페이지 = 40건

          ct_notices, ct_seen = [], set()
          for page in range(1, CT_PAGES + 1):
              sno = (page - 1) * CT_PER_PAGE
              print(f"\n[중앙당] 페이지 {page} (sno={sno})")
              page_url = f"{CT_URL}&sno={sno}"
              html = fetch(page_url, extra_headers={"Referer": CT_BASE + "/"})
              if not html:
                  print("  HTML 없음 — 스킵")
                  continue
              soup = BeautifulSoup(html, "lxml")

              # <time> 태그 기준으로 부모 탐색해서 제목/링크 추출
              for time_el in soup.find_all("time"):
                  date_str = time_el.get_text(strip=True).replace("/", "-").strip()
                  if not date_str:
                      continue
                  ancestor = time_el.parent
                  for _ in range(6):
                      if ancestor is None:
                          break
                      a = ancestor.find("a", href=True)
                      if a:
                          title = a.get_text(strip=True)
                          href = urljoin(page_url, a.get("href", ""))
                          if title and len(title) > 2 and href not in ct_seen:
                              cat_el = ancestor.select_one(".cate, .category, .label, span.tag, .type, .board_type")
                              category = cat_el.get_text(strip=True) if cat_el else "일반"
                              # 공지 타입 감지: 클래스나 텍스트에 "공지"/"notice" 포함 여부
                              anc_class = " ".join(ancestor.get("class", []))
                              if "notice" in anc_class.lower() or "공지" in anc_class:
                                  category = "공지"
                              ct_seen.add(href)
                              ct_notices.append({"title": title, "date": date_str, "link": href, "category": category})
                              print(f"  [{page}] {date_str} [{category}] {title[:40]}")
                          break
                      ancestor = ancestor.parent

              time.sleep(0.5)

          print(f"\n중앙당 수집: {len(ct_notices)}건")
          with open("central_data.json", "w", encoding="utf-8") as f:
              json.dump({"updated": now_utc, "items": ct_notices}, f, ensure_ascii=False, indent=2)

          # ── 경기도의회 (ggc.go.kr) ──────────────────────────────────────
          import re as _re
          from playwright.sync_api import sync_playwright

          GC_BASE  = "https://www.ggc.go.kr"
          GC_URL   = f"{GC_BASE}/site/main/board/pblcntc/list"
          GC_PAGES = 5

          gc_notices, gc_seen = [], set()

          def parse_gc_html(html, page_url):
              soup = BeautifulSoup(html, "lxml")
              count = 0
              for row in soup.select("tbody tr"):
                  a = row.select_one("td a[href]")
                  if not a:
                      continue
                  title = a.get_text(strip=True)
                  href = urljoin(page_url, a.get("href", ""))
                  if not title or len(title) < 3 or href in gc_seen:
                      continue
                  date_str = ""
                  for td in row.select("td"):
                      t = td.get_text(strip=True)
                      if _re.search(r'20\d\d[.\-]\d\d[.\-]\d\d', t):
                          date_str = t
                          break
                  row_class = " ".join(row.get("class", []))
                  is_notice = "notice" in row_class or row.select_one(".notice,.noti,.important") is not None
                  category = "공지" if is_notice else "일반"
                  gc_seen.add(href)
                  gc_notices.append({"title": title, "date": date_str, "link": href, "category": category})
                  print(f"  {date_str} [{category}] {title[:40]}")
                  count += 1
              return count

          # Playwright로만 가능 (직접 요청/프록시 모두 403)
          # cp=N URL 파라미터로 각 페이지 직접 이동
          with sync_playwright() as pw:
              browser = pw.chromium.launch(headless=True)
              ctx = browser.new_context(
                  user_agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120.0.0.0 Safari/537.36",
                  locale="ko-KR",
                  viewport={"width": 1280, "height": 800},
              )
              page_pw = ctx.new_page()
              for pg in range(1, GC_PAGES + 1):
                  page_url = f"{GC_URL}?cp={pg}"
                  print(f"\n[경기도의회] 페이지 {pg}")
                  try:
                      page_pw.goto(page_url, wait_until="networkidle", timeout=30000)
                      html = page_pw.content()
                      cnt = parse_gc_html(html, GC_URL)
                      print(f"  → {cnt}건 추가 (누계 {len(gc_notices)}건)")
                  except Exception as e:
                      print(f"  페이지{pg} ERROR: {e}")
                  time.sleep(1)
              browser.close()

          print(f"\n경기도의회 수집: {len(gc_notices)}건")
          # 0건이면 기존 파일 유지
          if gc_notices:
              with open("council_data.json", "w", encoding="utf-8") as f:
                  json.dump({"updated": now_utc, "items": gc_notices}, f, ensure_ascii=False, indent=2)
          else:
              print("  수집 실패 — 기존 council_data.json 유지")

          EOF

      - name: 변경사항 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add notices_data.json central_data.json council_data.json
          git diff --cached --quiet || git commit -m "chore: 공지사항 데이터 업데이트 $(date +'%Y-%m-%d %H:%M')"
          git push
