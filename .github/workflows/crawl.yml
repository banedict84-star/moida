name: 공지사항 크롤링

on:
  schedule:
    - cron: '0 0 * * *'  # 매일 오전 9시 KST (UTC 0시)
  workflow_dispatch:      # 수동 실행 가능

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 패키지 설치
        run: pip install requests beautifulsoup4 lxml

      - name: 공지사항 크롤링
        run: |
          python3 - <<'EOF'
          import json, re
          from datetime import datetime, timezone
          import requests
          from bs4 import BeautifulSoup

          BASE_URL = "https://www.minjookg.kr"
          NOTICE_URL = f"{BASE_URL}/sub01_news/notice.php"

          proxy_url = f"https://corsproxy.io/?{NOTICE_URL}"
          print(f"Fetching: {proxy_url}")

          resp = requests.get(proxy_url, timeout=30, headers={"Origin": "https://corsproxy.io"})
          resp.encoding = "utf-8"
          html = resp.text
          print(f"Status: {resp.status_code}, bytes: {len(resp.content)}")

          soup = BeautifulSoup(html, "lxml")
          notices = []

          def parse_item(li, category="일반"):
              a = li.select_one("a[href]")
              if not a:
                  return None
              title = a.get_text(strip=True)
              href = a.get("href", "")
              if not href.startswith("http"):
                  href = BASE_URL + href if href.startswith("/") else BASE_URL + "/" + href
              date_el = li.select_one("span.date")
              date_str = date_el.get_text(strip=True).replace("\t", "").replace("\n", "").strip() if date_el else ""
              # Normalize date format YYYY/MM/DD -> YYYY-MM-DD
              date_str = date_str.replace("/", "-")
              if title and len(title) > 2:
                  return {"title": title, "date": date_str, "link": href, "category": category}
              return None

          # Pinned notices (div.notice ul li)
          for li in soup.select(".notice ul li"):
              item = parse_item(li, category="공지")
              if item:
                  notices.append(item)

          # Regular list (div.list_A ul li)
          for li in soup.select(".list_A ul li"):
              item = parse_item(li, category="일반")
              if item:
                  notices.append(item)

          print(f"\n최종 수집: {len(notices)}건")
          for n in notices[:5]:
              print(n)

          now_utc = datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M UTC")
          result = {
              "updated": now_utc,
              "items": notices
          }

          with open("notices_data.json", "w", encoding="utf-8") as f:
              json.dump(result, f, ensure_ascii=False, indent=2)

          print(f"저장 완료: {len(notices)}건")
          EOF

      - name: 변경사항 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add notices_data.json
          git diff --cached --quiet || git commit -m "chore: 공지사항 데이터 업데이트 $(date +'%Y-%m-%d')"
          git push
