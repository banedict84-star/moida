name: 공지사항 크롤링

on:
  schedule:
    - cron: '0 0 * * *'  # 매일 오전 9시 KST (UTC 0시)
  workflow_dispatch:      # 수동 실행 가능

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Playwright 설치
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: 공지사항 크롤링
        run: |
          python3 - <<'EOF'
          import json, re
          from datetime import datetime
          from playwright.sync_api import sync_playwright

          url = "https://www.minjookg.kr/sub01_news/notice.php"

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              page = browser.new_page(
                  user_agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/124.0 Safari/537.36"
              )
              page.goto(url, wait_until="networkidle", timeout=30000)

              items = page.query_selector_all(".board-item")
              notices = []
              for item in items:
                  text = item.inner_text().strip().split("\n")
                  text = [t.strip() for t in text if t.strip()]

                  date_m = re.search(r"\d{4}[-./]\d{2}[-./]\d{2}", item.inner_text())
                  date = date_m.group(0) if date_m else ""

                  link_el = item.query_selector("a")
                  link = link_el.get_attribute("href") if link_el else ""
                  if link and not link.startswith("http"):
                      link = "https://www.minjookg.kr" + link

                  category = text[0] if len(text) > 1 else ""
                  title = text[1] if len(text) > 1 else text[0] if text else ""

                  if title:
                      notices.append({"title": title, "date": date, "link": link, "category": category})

              browser.close()

          result = {
              "updated": datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC"),
              "items": notices
          }

          with open("notices_data.json", "w", encoding="utf-8") as f:
              json.dump(result, f, ensure_ascii=False, indent=2)

          print(f"수집 완료: {len(notices)}건")
          EOF

      - name: 변경사항 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add notices_data.json
          git diff --cached --quiet || git commit -m "chore: 공지사항 데이터 업데이트 $(date +'%Y-%m-%d')"
          git push
