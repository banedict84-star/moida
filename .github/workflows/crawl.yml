name: 공지사항 크롤링

on:
  schedule:
    - cron: '0 0 * * *'  # 매일 오전 9시 KST (UTC 0시)
  workflow_dispatch:      # 수동 실행 가능

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 패키지 설치
        run: pip install requests beautifulsoup4 lxml

      - name: 공지사항 크롤링
        run: |
          python3 - <<'EOF'
          import json, re
          from datetime import datetime, timezone
          import requests
          from bs4 import BeautifulSoup

          BASE_URL = "https://www.minjookg.kr"
          NOTICE_URL = f"{BASE_URL}/sub01_news/notice.php"

          # corsproxy.io works - fetch with proper encoding handling
          proxy_url = f"https://corsproxy.io/?{NOTICE_URL}"
          print(f"Fetching: {proxy_url}")

          resp = requests.get(proxy_url, timeout=30, headers={"Origin": "https://corsproxy.io"})
          print(f"Status: {resp.status_code}, bytes: {len(resp.content)}")
          print(f"Detected encoding: {resp.encoding}")

          # Force UTF-8 since the site is Korean and charset=utf-8 is standard
          resp.encoding = "utf-8"
          html = resp.text

          print("=== HTML 앞 300자 ===")
          print(html[:300])

          soup = BeautifulSoup(html, "lxml")

          # Print relevant sections
          print("\n=== .notice 섹션 ===")
          notice_sec = soup.select(".notice")
          print(f".notice 개수: {len(notice_sec)}")
          for sec in notice_sec[:3]:
              print(str(sec)[:500])

          print("\n=== .list_A 섹션 ===")
          lista = soup.select(".list_A")
          print(f".list_A 개수: {len(lista)}")
          for sec in lista[:2]:
              print(str(sec)[:500])

          print("\n=== .date 요소들 ===")
          dates = soup.select(".date")
          print(f".date 개수: {len(dates)}")
          for d in dates[:5]:
              print(repr(d.get_text(strip=True)), str(d)[:100])

          print("\n=== .no 요소들 ===")
          nos = soup.select(".no")
          for n in nos[:5]:
              print(repr(n.get_text(strip=True)), str(n)[:80])

          print("\n=== .label 요소들 ===")
          labels = soup.select(".label")
          for lbl in labels[:10]:
              print(repr(lbl.get_text(strip=True)), str(lbl)[:100])

          notices = []

          # Try selectors based on known classes
          selectors = [
              ".notice li",
              ".list_A li",
              "ul.notice > li",
              ".board-list li",
              "li.no",
              "ul li.no",
          ]

          for sel in selectors:
              items = soup.select(sel)
              if items:
                  print(f"\n선택자 '{sel}': {len(items)}개")
                  print(f"첫 아이템: {str(items[0])[:300]}")

          # Try table approach too
          print("\n=== 테이블들 ===")
          tables = soup.select("table")
          print(f"테이블 수: {len(tables)}")
          for t in tables[:2]:
              print(str(t)[:500])

          print(f"\n최종 수집: {len(notices)}건")

          now_utc = datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M UTC")
          result = {
              "updated": now_utc,
              "items": notices
          }

          with open("notices_data.json", "w", encoding="utf-8") as f:
              json.dump(result, f, ensure_ascii=False, indent=2)
          EOF

      - name: 변경사항 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add notices_data.json
          git diff --cached --quiet || git commit -m "chore: 공지사항 데이터 업데이트 $(date +'%Y-%m-%d')"
          git push
