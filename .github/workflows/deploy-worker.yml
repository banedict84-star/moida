name: GPT 워커 자동 배포

# gpt-worker.js / wrangler.toml 가 main에 올라오면 Cloudflare 워커(moida-gpt)에 자동 배포.
# 필요 시 Actions 탭에서 수동 실행도 가능(workflow_dispatch).
on:
  push:
    branches: [main]
    paths:
      - 'gpt-worker.js'
      - 'wrangler.toml'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # GitHub에 OPENAI_API_KEY 시크릿이 있으면 'true', 없으면 'false'
    env:
      HAS_OPENAI: ${{ secrets.OPENAI_API_KEY != '' }}
    steps:
      - uses: actions/checkout@v4

      # (A) GitHub에 OPENAI_API_KEY가 등록돼 있으면: 배포 + 키를 워커에 자동 주입
      #     → 재배포해도 키가 유실되지 않음(권장).
      - name: Deploy (with OPENAI_API_KEY injection)
        if: env.HAS_OPENAI == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          secrets: |
            OPENAI_API_KEY
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      # (B) GitHub에 키가 없으면: 배포만 수행하고 Cloudflare에 수동 등록된 시크릿은 절대 건드리지 않음.
      #     (wrangler deploy는 기존 시크릿을 보존함)
      - name: Deploy (keep Cloudflare-managed secret)
        if: env.HAS_OPENAI != 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
