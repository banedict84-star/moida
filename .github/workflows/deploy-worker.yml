name: GPT 워커 자동 배포

# gpt-worker.js / wrangler.toml 가 main에 올라오면 Cloudflare 워커(moida-gpt)에 자동 배포.
# 필요 시 Actions 탭에서 수동 실행도 가능(workflow_dispatch).
on:
  push:
    branches: [main]
    paths:
      - 'gpt-worker.js'
      - 'wrangler.toml'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
