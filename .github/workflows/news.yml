name: 뉴스 크롤링

on:
  schedule:
    - cron: '30 * * * *'   # 매시간 30분
  workflow_dispatch:        # 수동 실행 가능

permissions:
  contents: write

jobs:
  news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 패키지 설치
        run: pip install requests beautifulsoup4 lxml

      - name: 뉴스 크롤링 (구글 + 네이버 + 다음)
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: |
          python3 - <<'EOF'
          import os, re, json, time, urllib.parse
          from datetime import datetime, timezone
          from email.utils import parsedate_to_datetime
          import requests
          from bs4 import BeautifulSoup

          UA = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36"
          HEAD = {"User-Agent": UA, "Accept-Language": "ko-KR,ko;q=0.9"}

          # 수집할 키워드 (뉴스검색 추천 칩과 동일)
          KEYWORDS = ["장윤정 경기도의원", "장윤정 안산", "안산 상록구", "경기도의회 장윤정", "안산 교육"]

          def clean(s):
              s = re.sub(r"<[^>]+>", "", s or "")
              for a, b in [("&quot;", '"'), ("&amp;", "&"), ("&lt;", "<"), ("&gt;", ">"), ("&#39;", "'"), ("&nbsp;", " ")]:
                  s = s.replace(a, b)
              return re.sub(r"\s+", " ", s).strip()

          def host(url):
              try: return urllib.parse.urlparse(url).netloc.replace("www.", "")
              except Exception: return ""

          # ── 구글 뉴스 RSS ─────────────────────────────────────────────
          def google(q):
              import xml.etree.ElementTree as ET
              url = "https://news.google.com/rss/search?q=%s&hl=ko&gl=KR&ceid=KR:ko" % urllib.parse.quote(q)
              out = []
              try:
                  r = requests.get(url, headers=HEAD, timeout=20)
                  root = ET.fromstring(r.content)
              except Exception as e:
                  print("  google ERROR", e); return out
              for it in root.iter("item"):
                  title = (it.findtext("title") or "").strip()
                  link = it.findtext("link") or ""
                  src = it.findtext("source") or ""
                  if src and title.endswith(" - " + src):
                      title = title[:-(len(src) + 3)]
                  elif not src and " - " in title:
                      parts = title.rsplit(" - ", 1); title, src = parts[0], parts[1]
                  desc = clean(it.findtext("description") or "")
                  try: d = parsedate_to_datetime(it.findtext("pubDate")).strftime("%Y.%m.%d")
                  except Exception: d = ""
                  if title and link:
                      out.append({"source": "google", "press": src or "뉴스", "date": d,
                                  "title": title, "snippet": (desc or title)[:160], "url": link})
              return out[:20]

          # ── 네이버: 공식 검색 API (키 있을 때) ───────────────────────────
          NID = os.environ.get("NAVER_CLIENT_ID"); NSEC = os.environ.get("NAVER_CLIENT_SECRET")
          def naver_api(q):
              if not (NID and NSEC): return None
              url = "https://openapi.naver.com/v1/search/news.json?query=%s&display=30&sort=date" % urllib.parse.quote(q)
              try:
                  r = requests.get(url, headers={"X-Naver-Client-Id": NID, "X-Naver-Client-Secret": NSEC}, timeout=15)
              except Exception as e:
                  print("  naver api ERROR", e); return []
              if r.status_code != 200:
                  print("  naver api HTTP", r.status_code, r.text[:120]); return []
              out = []
              for it in r.json().get("items", []):
                  link = it.get("originallink") or it.get("link", "")
                  title = clean(it.get("title", "")); desc = clean(it.get("description", ""))
                  try: d = parsedate_to_datetime(it.get("pubDate", "")).strftime("%Y.%m.%d")
                  except Exception: d = ""
                  if title and link:
                      out.append({"source": "naver", "press": host(link) or "네이버뉴스", "date": d,
                                  "title": title, "snippet": desc[:160], "url": link})
              return out

          # ── 네이버: API 키 없을 때 HTML 스크래핑(베스트 에포트) ──────────
          def naver_html(q):
              url = "https://search.naver.com/search.naver?where=news&query=%s&sort=1" % urllib.parse.quote(q)
              out = []
              try:
                  r = requests.get(url, headers=HEAD, timeout=15); soup = BeautifulSoup(r.text, "lxml")
              except Exception as e:
                  print("  naver html ERROR", e); return out
              for a in soup.select("a.news_tit"):
                  title = (a.get("title") or a.get_text(strip=True) or "").strip()
                  link = a.get("href", "")
                  if title and link.startswith("http"):
                      out.append({"source": "naver", "press": host(link) or "네이버뉴스", "date": "",
                                  "title": title, "snippet": title[:160], "url": link})
              return out[:20]

          def naver(q):
              res = naver_api(q)
              if res is None:
                  print("  (네이버 API 키 없음 → HTML 스크래핑)")
                  return naver_html(q)
              return res

          # ── 다음 뉴스 검색 HTML(베스트 에포트) ──────────────────────────
          def daum(q):
              url = "https://search.daum.net/search?w=news&q=%s&sort=recency" % urllib.parse.quote(q)
              out, seen = [], set()
              try:
                  r = requests.get(url, headers=HEAD, timeout=15); soup = BeautifulSoup(r.text, "lxml")
              except Exception as e:
                  print("  daum ERROR", e); return out
              # 실제 검색 결과 기사 링크(v.daum.net/v/... 또는 언론사 원문)만 대상
              anchors = soup.select(".item-title a, .tit-g a, a.tit_main, .c-item-doc a, [class*=tit] a")
              tokens = [t for t in q.split() if len(t) >= 2]
              for a in anchors:
                  title = (a.get("title") or a.get_text(strip=True) or "").strip()
                  link = a.get("href", "")
                  if len(title) < 8 or not link.startswith("http") or "daum.net/search" in link or link in seen:
                      continue
                  # 검색어 관련성: 제목에 키워드 토큰이 하나라도 포함될 때만 채택(고정 블록 노이즈 제거)
                  if tokens and not any(tok in title for tok in tokens):
                      continue
                  seen.add(link)
                  out.append({"source": "daum", "press": host(link) or "다음뉴스", "date": "",
                              "title": title, "snippet": title[:160], "url": link})
                  if len(out) >= 15: break
              return out

          # ── 수집 & 병합 ────────────────────────────────────────────────
          pool, seen = [], set()
          def add(items):
              for n in items:
                  key = re.sub(r"[^0-9a-z가-힣]", "", (n.get("title") or "").lower())[:40]
                  if not key or key in seen: continue
                  seen.add(key); pool.append(n)

          for q in KEYWORDS:
              print("\n[키워드]", q)
              for name, fn in [("구글", google), ("네이버", naver), ("다음", daum)]:
                  try:
                      rows = fn(q); add(rows); print("  %s: %d건" % (name, len(rows)))
                  except Exception as e:
                      print("  %s ERROR %s" % (name, e))
                  time.sleep(0.4)

          def dkey(n):
              return re.sub(r"[^0-9]", "", n.get("date") or "")
          pool.sort(key=dkey, reverse=True)

          by_src = {}
          for n in pool: by_src[n["source"]] = by_src.get(n["source"], 0) + 1
          print("\n총", len(pool), "건", by_src)

          now = datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M UTC")
          if pool:
              with open("news_data.json", "w", encoding="utf-8") as f:
                  json.dump({"updated": now, "items": pool[:120]}, f, ensure_ascii=False, indent=2)
          else:
              print("수집 0건 — 기존 news_data.json 유지")
          EOF

      - name: 변경사항 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news_data.json
          git diff --cached --quiet || git commit -m "chore: 뉴스 데이터 업데이트 $(date +'%Y-%m-%d %H:%M')"
          git push
