name: Daily Briefing

on:
  schedule:
    - cron: '0 22 * * *'   # 매일 07:00 KST (22:00 UTC 전날)
  workflow_dispatch:        # 수동 실행 버튼 (테스트용)
    inputs:
      dry_run:
        description: '발송 없이 미리보기만 (1=dry)'
        required: false
        default: '0'

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps
        working-directory: briefing
        run: npm install
      - name: Send briefing
        working-directory: briefing
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          BRIEFING_KEYWORDS: ${{ vars.BRIEFING_KEYWORDS }}
          BRIEFING_UID: ${{ vars.BRIEFING_UID }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node briefing.mjs
