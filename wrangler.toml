# moida-gpt — AI 비서실장 OpenAI 프록시 워커 배포 설정
# GitHub Actions(.github/workflows/deploy-worker.yml)가 이 파일을 읽어 자동 배포합니다.
# 비밀키(OPENAI_API_KEY)는 여기에 두지 않습니다 — Cloudflare 시크릿으로만 보관(배포 시 유지됨).

name = "moida-gpt"
main = "gpt-worker.js"
compatibility_date = "2024-11-01"
