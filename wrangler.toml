# 평문 변수(비밀 아님): AI Gateway 경유 OpenAI 엔드포인트
[vars]
OPENAI_BASE = "https://gateway.ai.cloudflare.com/v1/0a43eeb2c6fe53d7e8e6f38d7ea96905/moida/openai"
