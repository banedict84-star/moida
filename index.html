<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOIDA · 로그인</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  :root{
    --bg:#f1f5fb; --surface:#ffffff; --line:#e3e9f2; --line-soft:#eef3fa;
    --ink:#15233d; --ink-2:#51607a; --ink-3:#8794aa; --ink-4:#b3bdcf;
    --primary:#1452a0; --primary-600:#0e3f80; --primary-700:#0a3068; --primary-soft:#e7f0fb;
    --shadow-card:0 2px 6px rgba(16,40,80,.05),0 22px 54px rgba(16,40,80,.14);
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{ font-family:"Pretendard Variable",Pretendard,-apple-system,system-ui,sans-serif; color:var(--ink); -webkit-font-smoothing:antialiased; letter-spacing:-.01em; }

  .stage{ min-height:100vh; display:flex; align-items:center; justify-content:center; padding:32px 20px; position:relative; overflow:hidden;
    background:
      radial-gradient(120% 80% at 84% -8%, rgba(208,232,255,.9) 0%, rgba(208,232,255,0) 44%),
      radial-gradient(95% 70% at 10% 6%, rgba(173,209,246,.62) 0%, rgba(173,209,246,0) 52%),
      linear-gradient(168deg,#bcd8f4 0%,#c6def3 22%,#d6e6f3 44%,#e6eef6 66%,#eef3f9 84%,var(--bg) 100%); }
  .stage::after{ content:""; position:absolute; left:0; right:0; bottom:0; height:200px; background:linear-gradient(180deg,rgba(241,245,251,0),var(--bg)); pointer-events:none; }
  .stage::before{ content:""; position:absolute; right:-120px; top:-140px; width:420px; height:420px; border-radius:50%; background:radial-gradient(circle,rgba(255,255,255,.5),rgba(255,255,255,0) 68%); pointer-events:none; }

  .card{ position:relative; z-index:1; width:412px; max-width:100%; background:var(--surface); border:1px solid rgba(255,255,255,.9); border-radius:24px; box-shadow:var(--shadow-card); padding:42px 38px 30px; }

  .brand{ display:flex; flex-direction:column; align-items:center; gap:16px; }
  .logo-mark{ width:60px; height:60px; border-radius:18px; flex-shrink:0; background:linear-gradient(140deg,#2f74c9 0%,#1452a0 58%,#0e3f80 100%); display:flex; align-items:center; justify-content:center; box-shadow:0 8px 22px rgba(20,82,160,.36); position:relative; overflow:hidden; }
  .logo-mark::after{ content:""; position:absolute; inset:0; background:radial-gradient(64% 54% at 28% 20%,rgba(255,255,255,.46),rgba(255,255,255,0) 70%); }
  .brand-name{ font-size:30px; font-weight:800; letter-spacing:-.04em; line-height:1; }
  .brand-name b{ color:var(--primary); }
  .brand-sub{ font-size:14px; color:var(--ink-3); font-weight:500; margin-top:-4px; }

  .welcome{ text-align:center; margin:30px 0 22px; }
  .welcome h1{ font-size:21px; font-weight:800; letter-spacing:-.03em; }
  .welcome p{ font-size:13.5px; color:var(--ink-3); font-weight:500; margin-top:7px; }

  .gbtn{ width:100%; display:flex; align-items:center; justify-content:center; gap:11px; padding:14px; border:1px solid var(--line); background:#fff; border-radius:13px; font-family:inherit; font-size:14.5px; font-weight:700; color:var(--ink); cursor:pointer; transition:background .15s,border-color .15s,box-shadow .15s; }
  .gbtn:hover{ background:#fafbfd; border-color:#d4dde9; box-shadow:0 4px 14px rgba(16,40,80,.07); }
  .gbtn svg{ width:19px; height:19px; flex-shrink:0; }

  .divider{ display:flex; align-items:center; gap:14px; margin:22px 0; color:var(--ink-4); font-size:12px; font-weight:600; }
  .divider::before,.divider::after{ content:""; flex:1; height:1px; background:var(--line); }

  .field{ margin-bottom:13px; }
  .field label{ display:block; font-size:12.5px; font-weight:700; color:var(--ink-2); margin-bottom:7px; padding-left:2px; }
  .input-wrap{ position:relative; display:flex; align-items:center; }
  .input-wrap > svg{ position:absolute; left:14px; width:17px; height:17px; color:var(--ink-3); pointer-events:none; }
  .field input{ width:100%; padding:13px 14px 13px 41px; border:1px solid var(--line); border-radius:12px; font-family:inherit; font-size:14px; color:var(--ink); outline:none; transition:border-color .15s,box-shadow .15s; background:#fcfdff; }
  .field input::placeholder{ color:var(--ink-4); }
  .field input:focus{ border-color:var(--primary); box-shadow:0 0 0 3px var(--primary-soft); background:#fff; }
  .eye{ position:absolute; right:8px; width:32px; height:32px; border:none; background:transparent; color:var(--ink-3); cursor:pointer; display:flex; align-items:center; justify-content:center; border-radius:8px; }
  .eye:hover{ background:var(--line-soft); }

  .row{ display:flex; align-items:center; justify-content:space-between; margin:4px 2px 20px; }
  .remember{ display:flex; align-items:center; gap:8px; font-size:13px; color:var(--ink-2); font-weight:600; cursor:pointer; user-select:none; }
  .remember input{ width:16px; height:16px; accent-color:var(--primary); cursor:pointer; }
  .forgot{ font-size:13px; color:var(--primary); font-weight:600; cursor:pointer; }
  .forgot:hover{ text-decoration:underline; }

  .login-btn{ width:100%; padding:14px; border:none; border-radius:13px; background:linear-gradient(135deg,#1a5bb0,#0e3f80); color:#fff; font-family:inherit; font-size:15px; font-weight:700; cursor:pointer; box-shadow:0 8px 20px rgba(20,82,160,.3); transition:transform .12s,box-shadow .15s; display:flex; align-items:center; justify-content:center; gap:8px; }
  .login-btn:hover{ transform:translateY(-1px); box-shadow:0 12px 26px rgba(20,82,160,.38); }
  .login-btn svg{ width:17px; height:17px; }

  .signup{ text-align:center; font-size:13.5px; color:var(--ink-3); font-weight:500; margin-top:22px; }
  .signup a{ color:var(--primary); font-weight:700; text-decoration:none; cursor:pointer; }
  .signup a:hover{ text-decoration:underline; }
  .tab-row{ display:flex; background:var(--line-soft); border-radius:12px; padding:3px; gap:2px; margin-bottom:22px; }
  .tab-row button{ flex:1; padding:9px; border:none; background:transparent; border-radius:9px; font-family:inherit; font-size:13.5px; font-weight:700; color:var(--ink-3); cursor:pointer; transition:all .15s; }
  .tab-row button.on{ background:#fff; color:var(--primary); box-shadow:0 2px 8px rgba(16,40,80,.08); }
  .err-msg{ font-size:12.5px; color:#dc2626; font-weight:600; margin-top:10px; text-align:center; min-height:18px; }
  .ok-msg{ font-size:12.5px; color:#059669; font-weight:600; margin-top:10px; text-align:center; min-height:18px; }

  .foot{ position:relative; z-index:1; margin-top:26px; text-align:center; font-size:12px; color:var(--ink-3); font-weight:500; }
  .foot b{ color:var(--ink-2); font-weight:700; }

  .badge-admin{ position:absolute; top:24px; right:26px; z-index:2; display:inline-flex; align-items:center; gap:7px; background:rgba(255,255,255,.78); border:1px solid rgba(255,255,255,.9); backdrop-filter:blur(8px); border-radius:11px; padding:9px 14px; font-size:13px; font-weight:700; color:var(--ink-2); cursor:pointer; box-shadow:0 4px 14px rgba(16,40,80,.08); transition:background .15s; }
  .badge-admin:hover{ background:#fff; }
  .badge-admin .led{ width:7px; height:7px; border-radius:50%; background:#e0245e; box-shadow:0 0 0 3px rgba(224,36,94,.18); }

  .wrap{ position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; }

  @media(max-width:480px){ .card{ padding:34px 24px 26px; border-radius:20px; } }
</style>
</head>
<body>
<div class="stage">
  <div class="badge-admin" onclick="location.href='admin.html'"><span class="led"></span>총관리자 로그인</div>

  <div class="wrap">
    <div class="card">
      <div class="brand">
        <div class="logo-mark"><svg width="33" height="33" viewBox="0 0 24 24" fill="none">
          <path d="M7 8.5 12 14.5 17 8.5" stroke="#fff" stroke-opacity=".55" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="7" cy="8" r="2.6" fill="#fff"/><circle cx="17" cy="8" r="2.6" fill="#fff"/><circle cx="12" cy="15.5" r="3.1" fill="#fff"/>
        </svg></div>
        <div style="text-align:center">
          <div class="brand-name">MO<b>IDA</b></div>
        </div>
      </div>

      <div class="welcome">
        <h1 id="welcomeTitle">다시 오신 것을 환영합니다</h1>
        <p>경기도의원 장윤정 의정활동 관리 시스템</p>
      </div>

      <div class="tab-row">
        <button class="on" id="tabLogin" onclick="switchTab('login')">로그인</button>
        <button id="tabSignup" onclick="switchTab('signup')">가입하기</button>
      </div>

      <!-- 로그인 영역 -->
      <div id="loginArea">
        <button class="gbtn" id="gLoginBtn">
          <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A11 11 0 0 0 12 23z"/><path fill="#FBBC05" d="M5.84 14.1a6.6 6.6 0 0 1 0-4.2V7.06H2.18a11 11 0 0 0 0 9.88l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1A11 11 0 0 0 2.18 7.06l3.66 2.84C6.71 7.31 9.14 5.38 12 5.38z"/></svg>
          Google 계정으로 로그인
        </button>
        <div class="divider">또는 이메일로 로그인</div>
        <div class="field">
          <label>이메일</label>
          <div class="input-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2.5"/><path d="m4 7 8 6 8-6"/></svg>
            <input type="email" id="loginEmail" placeholder="name@example.com" autocomplete="email">
          </div>
        </div>
        <div class="field">
          <label>비밀번호</label>
          <div class="input-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="10.5" width="16" height="10" rx="2.5"/><path d="M8 10.5V7a4 4 0 0 1 8 0v3.5"/></svg>
            <input type="password" id="pw" placeholder="비밀번호 입력" autocomplete="current-password">
            <button class="eye" id="eye" type="button" aria-label="비밀번호 표시">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="17" height="17"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div class="row">
          <label class="remember"><input type="checkbox"> 로그인 상태 유지</label>
          <span class="forgot">비밀번호 찾기</span>
        </div>
        <button class="login-btn" id="loginBtn">로그인
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
        </button>
        <div class="err-msg" id="loginErr"></div>
        <div class="signup" style="margin-top:14px">아직 계정이 없으신가요? <a onclick="switchTab('signup')">가입하기</a></div>
      </div>

      <!-- 가입 영역 -->
      <div id="signupArea" style="display:none">
        <button class="gbtn" id="gSignupBtn">
          <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A11 11 0 0 0 12 23z"/><path fill="#FBBC05" d="M5.84 14.1a6.6 6.6 0 0 1 0-4.2V7.06H2.18a11 11 0 0 0 0 9.88l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1A11 11 0 0 0 2.18 7.06l3.66 2.84C6.71 7.31 9.14 5.38 12 5.38z"/></svg>
          Google 계정으로 가입
        </button>
        <div class="divider">또는 이메일로 가입</div>
        <div class="field">
          <label>이름</label>
          <div class="input-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20a8 8 0 0 1 16 0"/></svg>
            <input type="text" id="signupName" placeholder="홍길동" autocomplete="name">
          </div>
        </div>
        <div class="field">
          <label>이메일</label>
          <div class="input-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2.5"/><path d="m4 7 8 6 8-6"/></svg>
            <input type="email" id="signupEmail" placeholder="name@example.com" autocomplete="email">
          </div>
        </div>
        <div class="field">
          <label>비밀번호</label>
          <div class="input-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="10.5" width="16" height="10" rx="2.5"/><path d="M8 10.5V7a4 4 0 0 1 8 0v3.5"/></svg>
            <input type="password" id="signupPw" placeholder="6자 이상" autocomplete="new-password">
          </div>
        </div>
        <button class="login-btn" id="signupBtn" style="margin-top:6px">가입하기
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
        </button>
        <div class="err-msg" id="signupErr"></div>
        <div class="signup" style="margin-top:14px">이미 계정이 있으신가요? <a onclick="switchTab('login')">로그인</a></div>
      </div>
    </div>

    <div class="foot">© 2026 <b>MOIDA</b> · 경기도의원 장윤정 의정활동 관리 시스템</div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAIjhvbCztHoF7YwP2IYIk2C6jCI64uFhs",
    authDomain: "jjj2195-1bd15.firebaseapp.com",
    projectId: "jjj2195-1bd15",
    storageBucket: "jjj2195-1bd15.firebasestorage.app",
    messagingSenderId: "370852437825",
    appId: "1:370852437825:web:b0a891d6a99b426d230bc0"
  };
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();
  provider.setCustomParameters({ prompt: 'select_account' }); // 로그인/가입 시 구글 계정 선택창 표시

  // 탭 전환
  window.switchTab = function(tab) {
    var isLogin = tab==='login';
    document.getElementById('loginArea').style.display = isLogin?'':'none';
    document.getElementById('signupArea').style.display = isLogin?'none':'';
    document.getElementById('tabLogin').classList.toggle('on', isLogin);
    document.getElementById('tabSignup').classList.toggle('on', !isLogin);
    document.getElementById('welcomeTitle').textContent = isLogin?'다시 오신 것을 환영합니다':'새 계정 만들기';
    document.getElementById('loginErr').textContent='';
    document.getElementById('signupErr').textContent='';
  };

  // 비밀번호 토글
  var eye=document.getElementById('eye'), pw=document.getElementById('pw');
  eye.addEventListener('click',function(){ pw.type=pw.type==='password'?'text':'password'; eye.style.color=pw.type==='text'?'var(--primary)':''; });

  // Google 로그인
  document.getElementById('gLoginBtn').addEventListener('click', async function(){
    try { await signInWithPopup(auth, provider); location.href='dashboard.html'; }
    catch(e){ document.getElementById('loginErr').textContent=e.message; }
  });

  // Google 가입
  document.getElementById('gSignupBtn').addEventListener('click', async function(){
    var err=document.getElementById('signupErr');
    err.textContent=''; err.style.color='';
    try {
      var cred = await signInWithPopup(auth, provider);
      const db = getFirestore(app);
      await setDoc(doc(db, 'tenants', cred.user.uid), {
        id: cred.user.uid,
        name: cred.user.displayName || '',
        email: cred.user.email || '',
        position: '',
        district: '',
        phone: '',
        created: Date.now(),
        subscriptionStart: '',
        subscriptionEnd: ''
      }, { merge: true });
      location.href='dashboard.html';
    } catch(e){ err.textContent=e.message; }
  });

  // 이메일 로그인
  document.getElementById('loginBtn').addEventListener('click', async function(){
    var email=document.getElementById('loginEmail').value.trim();
    var password=pw.value;
    var err=document.getElementById('loginErr');
    err.textContent='';
    if(!email||!password){ err.textContent='이메일과 비밀번호를 입력하세요.'; return; }
    try { await signInWithEmailAndPassword(auth, email, password); location.href='dashboard.html'; }
    catch(e){ err.textContent = e.code==='auth/invalid-credential'?'이메일 또는 비밀번호가 올바르지 않습니다.':e.message; }
  });

  // 회원가입
  document.getElementById('signupBtn').addEventListener('click', async function(){
    var name=document.getElementById('signupName').value.trim();
    var email=document.getElementById('signupEmail').value.trim();
    var password=document.getElementById('signupPw').value;
    var err=document.getElementById('signupErr');
    err.textContent='';
    if(!name){ err.textContent='이름을 입력하세요.'; return; }
    if(!email){ err.textContent='이메일을 입력하세요.'; return; }
    if(password.length<6){ err.textContent='비밀번호는 6자 이상이어야 합니다.'; return; }
    try {
      var cred = await createUserWithEmailAndPassword(auth, email, password);
      await updateProfile(cred.user, { displayName: name });
      const db = getFirestore(app);
      await setDoc(doc(db, 'tenants', cred.user.uid), {
        id: cred.user.uid,
        name: name,
        email: email,
        position: '',
        district: '',
        phone: '',
        created: Date.now(),
        subscriptionStart: '',
        subscriptionEnd: ''
      });
      var okEl=document.getElementById('signupErr');
      okEl.style.color='#059669'; okEl.textContent='가입 완료! 로그인 해주세요.';
      setTimeout(function(){ switchTab('login'); okEl.textContent=''; okEl.style.color=''; }, 1500);
    } catch(e){
      err.textContent = e.code==='auth/email-already-in-use'?'이미 사용 중인 이메일입니다.':e.message;
    }
  });
</script>
</body>
</html>
