<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOIDA · 대시보드</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  :root{
    --bg:#f3f5f8;
    --surface:#ffffff;
    --line:#eceef3;
    --line-soft:#f1f3f7;
    --ink:#1c2030;
    --ink-2:#5a6072;
    --ink-3:#9298a8;
    --primary:#1452a0;
    --primary-soft:#e7f0fb;
    --shadow-card: 0 1px 2px rgba(22,26,45,.04), 0 8px 28px rgba(22,26,45,.07);
    --shadow-float: 0 2px 6px rgba(22,26,45,.05), 0 18px 44px rgba(22,26,45,.12);
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{
    font-family:"Pretendard Variable",Pretendard,-apple-system,system-ui,sans-serif;
    background:var(--bg); color:var(--ink); -webkit-font-smoothing:antialiased; letter-spacing:-.01em;
  }
  .app{ display:grid; grid-template-columns:236px 1fr; min-height:100vh; transition:grid-template-columns .22s ease; }

  /* ===== Sidebar ===== */
  .sidebar{ background:var(--surface); border-right:1px solid var(--line); display:flex; flex-direction:column; padding:18px 16px; position:sticky; top:0; height:100vh; overflow-y:auto; }
  .logo{ display:flex; align-items:center; gap:11px; padding:8px 8px 18px; }
  .logo-mark{ width:36px; height:36px; border-radius:11px; flex-shrink:0; background:linear-gradient(140deg,#2f74c9 0%,#1452a0 60%,#0e3f80 100%); display:flex; align-items:center; justify-content:center; box-shadow:0 5px 14px rgba(20,82,160,.34); position:relative; overflow:hidden; }
  .logo-mark::after{ content:""; position:absolute; inset:0; background:radial-gradient(65% 55% at 28% 20%, rgba(255,255,255,.42), rgba(255,255,255,0) 70%); }
  .logo-name{ font-size:20px; font-weight:800; letter-spacing:-.04em; color:#1c2030; line-height:1; }
  .logo-name b{ color:var(--primary); font-weight:800; }

  /* collapse toggle */
  .side-top{ display:flex; align-items:center; justify-content:space-between; gap:8px; }
  .collapse-btn{ position:absolute; top:29px; right:16px; z-index:5; width:30px; height:30px; border-radius:9px; border:1px solid var(--line); background:var(--surface); color:var(--ink-3); display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; transition:background .14s,color .14s; }
  .collapse-btn:hover{ background:var(--line-soft); color:var(--ink-2); }
  .collapse-btn svg{ transition:transform .22s ease; }
  .app.collapsed{ grid-template-columns:72px 1fr; }
  .app.collapsed .sidebar{ padding:18px 12px; align-items:stretch; }
  .app.collapsed .side-top{ flex-direction:column; gap:12px; }
  .app.collapsed .logo{ justify-content:center; }
  .app.collapsed .logo-name{ display:none; }
  .logo-expand{ display:none; }
  .app.collapsed .logo-dots{ display:none; }
  .app.collapsed .logo-expand{ display:block; }
  .app.collapsed .logo{ cursor:pointer; }
  .app.collapsed .collapse-btn{ display:none !important; }
  .app.collapsed .new-btn{ display:none; }
  .app.collapsed nav{ align-items:stretch; }
  .app.collapsed .nav-item{ justify-content:center; padding:11px 0; gap:0; }
  .app.collapsed .nav-item .nm,
  .app.collapsed .nav-item .badge{ display:none; }
  .app.collapsed .sec{ display:none; }
  .app.collapsed .upd-item{ display:none; }
  .app.collapsed .foot-item{ justify-content:center; gap:0; padding:9px 0; }
  .app.collapsed .foot-item span{ display:none; }
  .app.collapsed .foot-mail{ display:none; }

  /* hover tooltips when collapsed */
  .app.collapsed .sidebar{ overflow:visible; z-index:40; }
  .app.collapsed .nav-item, .app.collapsed .foot-item, .app.collapsed .sc-item{ position:relative; }
  .app.collapsed .nav-item[data-tip]:hover::after,
  .app.collapsed .foot-item[data-tip]:hover::after,
  .app.collapsed .sc-item[data-tip]:hover::after{
    content:attr(data-tip); position:absolute; left:calc(100% + 14px); top:50%; transform:translateY(-50%);
    background:#15182a; color:#fff; font-size:12.5px; font-weight:600; padding:7px 11px; border-radius:9px;
    white-space:nowrap; z-index:60; box-shadow:0 8px 20px rgba(22,26,45,.24); pointer-events:none;
  }
  .app.collapsed .nav-item[data-tip]:hover::before,
  .app.collapsed .foot-item[data-tip]:hover::before,
  .app.collapsed .sc-item[data-tip]:hover::before{
    content:""; position:absolute; left:calc(100% + 8px); top:50%; transform:translateY(-50%) rotate(45deg);
    width:9px; height:9px; background:#15182a; z-index:60; pointer-events:none; border-radius:1px;
  }

  .new-btn{ display:flex; align-items:center; justify-content:center; gap:8px; background:#15182a; color:#fff; border:none; border-radius:12px; padding:13px; font-size:14.5px; font-weight:700; cursor:pointer; font-family:inherit; transition:transform .12s, box-shadow .15s; box-shadow:0 6px 16px rgba(21,24,42,.22); }
  .new-btn:hover{ transform:translateY(-1px); box-shadow:0 10px 22px rgba(21,24,42,.3); }

  nav{ display:flex; flex-direction:column; gap:2px; margin-top:14px; }
  .nav-item{ display:flex; align-items:center; gap:11px; padding:10px 10px; border-radius:11px; cursor:pointer; color:var(--ink-2); font-size:14px; font-weight:600; text-decoration:none; transition:background .14s,color .14s; }
  .nav-item:hover{ background:var(--line-soft); color:var(--ink); }
  .nav-item.active{ background:var(--primary-soft); color:var(--primary); }
  .nav-item.active svg{ color:var(--primary); }
  .nav-item svg{ color:var(--ink-3); }
  .nav-item .nm{ flex:1; }
  .badge{ min-width:19px; height:19px; padding:0 6px; border-radius:20px; background:var(--primary); color:#fff; font-size:11px; font-weight:700; display:flex; align-items:center; justify-content:center; }
  .badge.muted{ background:#eef0f5; color:var(--ink-3); font-size:10.5px; font-weight:600; }
  .nav-item.dim{ color:var(--ink-3); cursor:default; }
  .nav-item.dim:hover{ background:transparent; }

  /* shortcuts */
  .sc-sec{ margin-top:10px; padding-top:10px; border-top:1px solid var(--line-soft); }
  .sc-head{ display:flex; align-items:center; padding:6px 10px 6px; font-size:11px; font-weight:700; letter-spacing:.04em; color:var(--ink-3); }
  .sc-item{ display:flex; align-items:center; gap:11px; padding:9px 10px; border-radius:11px; cursor:pointer; color:var(--ink-2); font-size:13.5px; font-weight:600; text-decoration:none; }
  .sc-item:hover{ background:var(--line-soft); color:var(--ink); }
  .sc-dot{ width:9px; height:9px; border-radius:3px; flex-shrink:0; }
  .sc-item .nm{ flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .sc-del{ width:20px; height:20px; border:none; background:none; color:var(--ink-3); display:none; align-items:center; justify-content:center; cursor:pointer; border-radius:6px; flex-shrink:0; }
  .sc-item:hover .sc-del{ display:flex; }
  .sc-del:hover{ background:#fde8e8; color:#dc2626; }
  .app.collapsed .sc-head{ display:none; }
  .app.collapsed .sc-item{ justify-content:center; gap:0; padding:10px 0; }
  .app.collapsed .sc-item .nm, .app.collapsed .sc-del{ display:none; }

  /* shortcut modal */
  .sc-ovl{ position:fixed; inset:0; background:rgba(18,24,42,.45); display:none; align-items:center; justify-content:center; z-index:80; }
  .sc-ovl.show{ display:flex; }
  .sc-modal{ width:380px; max-width:calc(100vw - 40px); background:#fff; border-radius:18px; box-shadow:0 30px 70px rgba(15,23,42,.3); overflow:hidden; }
  .sc-mhead{ padding:20px 22px 14px; }
  .sc-mtitle{ font-size:17px; font-weight:800; color:var(--ink); letter-spacing:-.02em; }
  .sc-msub{ font-size:12.5px; color:var(--ink-3); margin-top:4px; }
  .sc-opts{ padding:4px 14px 8px; display:flex; flex-direction:column; gap:2px; }
  .sc-opt{ display:flex; align-items:center; gap:12px; padding:11px 12px; border-radius:12px; cursor:pointer; }
  .sc-opt:hover{ background:var(--line-soft); }
  .sc-opt .sc-dot{ width:13px; height:13px; border-radius:4px; }
  .sc-opt .ol{ flex:1; font-size:14px; font-weight:600; color:var(--ink); }
  .sc-check{ width:22px; height:22px; border-radius:7px; border:2px solid var(--line); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .sc-opt.on .sc-check{ background:var(--primary); border-color:var(--primary); }
  .sc-opt .sc-check svg{ opacity:0; }
  .sc-opt.on .sc-check svg{ opacity:1; }
  .sc-mfoot{ display:flex; gap:9px; padding:14px 18px 18px; }
  .sc-btn{ flex:1; padding:12px; border-radius:12px; font-family:inherit; font-size:14px; font-weight:700; cursor:pointer; border:none; }
  .sc-btn.ghost{ background:var(--line-soft); color:var(--ink-2); }
  .sc-btn.solid{ background:var(--primary); color:#fff; }
  .sc-btn.solid:hover{ filter:brightness(1.05); }

  .sec{ display:flex; align-items:center; justify-content:space-between; padding:18px 10px 8px; }
  .sec-t{ font-size:11.5px; font-weight:700; color:var(--ink-3); letter-spacing:.04em; }
  .swatch{ width:14px; height:14px; border-radius:5px; flex-shrink:0; }
  .s-blue{ background:#3b82f6; } .s-orange{ background:#f59e0b; } .s-red{ background:#ef4444; }
  .s-yellow{ background:#eab308; } .s-sky{ background:#38bdf8; } .s-violet{ background:#8b5cf6; } .s-pink{ background:#ec4899; }
  .upd-item{ display:flex; align-items:center; gap:11px; padding:8px 10px; border-radius:10px; cursor:pointer; color:var(--ink-2); font-size:13.5px; font-weight:600; transition:background .14s; }
  .upd-item:hover{ background:var(--line-soft); }

  .side-foot{ margin-top:auto; padding-top:14px; border-top:1px solid var(--line); display:flex; flex-direction:column; gap:1px; }
  .foot-item{ display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:10px; color:var(--ink-2); font-size:13.5px; font-weight:600; cursor:pointer; text-decoration:none; transition:background .14s; }
  .foot-item:hover{ background:var(--line-soft); }
  .foot-item svg{ color:var(--ink-3); }
  .foot-mail{ font-size:11.5px; color:var(--ink-3); padding:4px 10px 2px; font-weight:500; }

  /* ===== Main ===== */
  .main{ position:relative; }
  .cover{ position:absolute; inset:0 0 auto 0; height:430px; z-index:0;
    background:
      radial-gradient(120% 80% at 84% -8%, rgba(208,232,255,.9) 0%, rgba(208,232,255,0) 44%),
      radial-gradient(95% 70% at 10% 6%, rgba(173,209,246,.62) 0%, rgba(173,209,246,0) 52%),
      linear-gradient(176deg, #bcd8f4 0%, #c6def3 24%, #d6e6f3 46%, #e6eef6 68%, #eef3f9 86%, var(--bg) 100%);
  }
  .cover::after{ content:""; position:absolute; left:0; right:0; bottom:0; height:130px; background:linear-gradient(180deg, rgba(243,245,248,0), var(--bg)); }

  /* topbar */
  .topbar{ position:relative; z-index:2; display:flex; align-items:center; gap:20px; padding:16px 32px; }
  .search{ flex:0 1 480px; margin:0 0 0 4px; display:flex; align-items:center; gap:10px; background:rgba(255,255,255,.82); backdrop-filter:blur(8px); border:1px solid rgba(255,255,255,.9); border-radius:999px; padding:11px 18px; box-shadow:0 4px 14px rgba(22,26,45,.08); }
  .search input{ flex:1; border:none; background:transparent; font-family:inherit; font-size:14px; color:var(--ink); outline:none; }
  .search input::placeholder{ color:var(--ink-3); }
  .search svg{ color:var(--ink-3); }
  .send{ width:28px; height:28px; border-radius:50%; background:var(--primary); border:none; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; }
  .search{ position:relative; }
  .search-results{ position:absolute; top:calc(100% + 8px); left:0; right:0; background:#fff; border:1px solid var(--line); border-radius:14px; box-shadow:0 18px 40px rgba(20,30,60,.16); padding:6px; display:none; z-index:30; max-height:380px; overflow-y:auto; }
  .search-results.show{ display:block; }
  .sr-group{ font-size:11px; font-weight:700; color:var(--ink-3); letter-spacing:.03em; padding:9px 12px 4px; }
  .sr-item{ display:flex; align-items:center; gap:10px; padding:9px 12px; border-radius:10px; cursor:pointer; text-decoration:none; }
  .sr-item:hover{ background:var(--line-soft); }
  .sr-ico{ width:28px; height:28px; border-radius:8px; flex-shrink:0; display:flex; align-items:center; justify-content:center; color:#fff; }
  .sr-ico.s-notice{ background:#1452a0; } .sr-ico.s-sched{ background:#2f74c9; } .sr-ico.s-member{ background:#0e7a6b; }
  .sr-body{ min-width:0; flex:1; }
  .sr-t{ font-size:13.5px; font-weight:600; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .sr-t b{ color:var(--primary); font-weight:700; }
  .sr-s{ font-size:12px; color:var(--ink-3); margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .sr-empty{ padding:16px 12px; font-size:13px; color:var(--ink-3); text-align:center; }
  .tb-right{ display:flex; align-items:center; gap:6px; margin-left:auto; }
  .tb-ico{ position:relative; width:38px; height:38px; border-radius:11px; background:rgba(255,255,255,.55); border:none; display:flex; align-items:center; justify-content:center; color:var(--ink-2); cursor:pointer; transition:background .14s; }
  .tb-ico:hover{ background:rgba(255,255,255,.9); }
  .tb-ico .dot{ position:absolute; top:6px; right:6px; min-width:15px; height:15px; padding:0 4px; border-radius:10px; background:#ef4444; color:#fff; font-size:9.5px; font-weight:700; display:flex; align-items:center; justify-content:center; }
  .noti-wrap{ position:relative; }
  .noti-panel{ position:absolute; top:calc(100% + 10px); right:0; width:320px; background:#fff; border:1px solid var(--line); border-radius:14px; box-shadow:0 18px 40px rgba(20,30,60,.18); display:none; z-index:40; overflow:hidden; }
  .noti-panel.show{ display:block; }
  .noti-head{ display:flex; align-items:center; justify-content:space-between; padding:13px 16px; border-bottom:1px solid var(--line-soft); font-size:14px; font-weight:700; color:var(--ink); }
  .noti-readall{ border:none; background:none; color:var(--primary); font-family:inherit; font-size:12px; font-weight:600; cursor:pointer; }
  .noti-readall:hover{ text-decoration:underline; }
  .noti-list{ max-height:340px; overflow-y:auto; padding:6px; }
  .noti-item{ display:flex; gap:11px; padding:11px 12px; border-radius:11px; cursor:pointer; text-decoration:none; position:relative; }
  .noti-item:hover{ background:var(--line-soft); }
  .noti-item.unread{ background:#f3f7fd; }
  .noti-item.unread:hover{ background:#e9f1fb; }
  .noti-ico{ width:34px; height:34px; border-radius:10px; flex-shrink:0; display:flex; align-items:center; justify-content:center; color:#fff; }
  .noti-ico.n-notice{ background:#1452a0; } .noti-ico.n-sched{ background:#2f74c9; } .noti-ico.n-member{ background:#0e7a6b; }
  .noti-body{ min-width:0; flex:1; }
  .noti-t{ font-size:13px; font-weight:600; color:var(--ink); line-height:1.35; }
  .noti-s{ font-size:11.5px; color:var(--ink-3); margin-top:2px; }
  .noti-unreaddot{ width:7px; height:7px; border-radius:50%; background:#ef4444; flex-shrink:0; align-self:center; }
  .noti-empty{ padding:30px 16px; text-align:center; font-size:13px; color:var(--ink-3); }
  .avatar{ width:38px; height:38px; border-radius:50%; background:linear-gradient(135deg,#2f74c9,#0e3f80); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px; cursor:pointer; box-shadow:0 3px 10px rgba(20,82,160,.35); }

  /* content */
  .content{ position:relative; z-index:1; padding:4px 32px 18px; }
  .greet-row{ display:flex; align-items:flex-start; justify-content:space-between; gap:20px; padding:6px 4px 0; }
  .greet h1{ font-size:25px; font-weight:800; letter-spacing:-.025em; color:#15233d; }
  .greet .status{ margin-top:6px; font-size:13.5px; color:#3a4d6b; font-weight:500; display:flex; align-items:center; gap:8px; }
  .greet .status .pin{ width:5px; height:5px; border-radius:50%; background:#6a7c98; }
  .gr-right{ text-align:right; flex-shrink:0; }
  .gr-date{ font-size:14.5px; font-weight:700; color:#1c3358; }
  .widget-set{ margin-top:10px; display:inline-flex; align-items:center; gap:7px; background:rgba(255,255,255,.7); border:1px solid rgba(255,255,255,.9); border-radius:10px; padding:8px 13px; font-size:13px; font-weight:600; color:var(--ink-2); cursor:pointer; transition:background .14s; }
  .widget-set:hover{ background:#fff; }

  /* ===== Widget settings modal ===== */
  .wm-ovl{ display:none; position:fixed; inset:0; background:rgba(16,28,52,.42); z-index:2000; align-items:flex-start; justify-content:center; padding:54px 20px; backdrop-filter:blur(3px); }
  .wm-ovl.show{ display:flex; }
  .wm{ background:#fff; border-radius:20px; width:760px; max-width:100%; max-height:84vh; display:flex; flex-direction:column; box-shadow:0 26px 70px rgba(16,28,52,.32); overflow:hidden; }
  .wm-head{ display:flex; align-items:center; justify-content:space-between; padding:20px 26px 16px; }
  .wm-head h2{ font-size:18px; font-weight:800; letter-spacing:-.02em; }
  .wm-x{ width:32px; height:32px; border:none; background:transparent; color:var(--ink-3); border-radius:9px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .wm-x:hover{ background:var(--line-soft); color:var(--ink-2); }
  .wm-body{ padding:4px 26px 24px; overflow-y:auto; }
  .wm-sec{ font-size:13px; font-weight:700; color:var(--ink-2); margin:14px 0 12px; }
  .wm-colors{ display:flex; flex-wrap:wrap; gap:12px; }
  .wm-color{ width:42px; height:42px; border-radius:50%; cursor:pointer; border:2px solid #fff; box-shadow:0 0 0 1px var(--line); transition:transform .12s, box-shadow .12s; }
  .wm-color:hover{ transform:scale(1.08); }
  .wm-color.sel{ box-shadow:0 0 0 2px var(--primary); transform:scale(1.08); }
  .wm-imgs{ display:flex; flex-wrap:wrap; gap:12px; }
  .wm-img{ width:118px; height:74px; border-radius:12px; cursor:pointer; border:2px solid #fff; box-shadow:0 0 0 1px var(--line); background-size:cover; background-position:center; transition:transform .12s; position:relative; }
  .wm-img:hover{ transform:translateY(-2px); }
  .wm-img.sel{ box-shadow:0 0 0 2px var(--primary); }
  .wm-img.more{ display:flex; align-items:center; justify-content:center; background:#fafbfd; color:var(--ink-3); font-size:12px; font-weight:600; }
  .wm-widgets{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .wm-w{ display:flex; align-items:center; gap:13px; padding:14px 16px; border:1px solid var(--line); border-radius:13px; }
  .wm-w-ic{ width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .wm-w-info{ flex:1; min-width:0; }
  .wm-w-t{ font-size:14px; font-weight:700; }
  .wm-w-d{ font-size:11.5px; color:var(--ink-3); margin-top:2px; }
  .wm-toggle{ width:42px; height:24px; border-radius:20px; background:#d4dae5; position:relative; cursor:pointer; flex-shrink:0; transition:background .16s; }
  .wm-toggle::after{ content:""; position:absolute; top:2px; left:2px; width:20px; height:20px; border-radius:50%; background:#fff; box-shadow:0 1px 3px rgba(0,0,0,.2); transition:left .16s; }
  .wm-toggle.on{ background:var(--primary); }
  .wm-toggle.on::after{ left:20px; }
  /* hidden widget */
  .card[data-hidden="1"]{ display:none; }
  /* applied cover bg */
  .cover[data-bg]{ background:var(--cover-bg) !important; }

  /* quick tiles */
  .tiles{ display:flex; gap:18px; margin-top:14px; padding:0 4px; }
  .tile{ display:flex; flex-direction:column; align-items:center; gap:9px; cursor:pointer; text-decoration:none; color:inherit; }
  .tile-ico{ width:52px; height:52px; border-radius:16px; display:flex; align-items:center; justify-content:center; box-shadow:0 8px 20px rgba(22,26,45,.13); transition:transform .14s, box-shadow .14s; }
  .tile:hover .tile-ico{ transform:translateY(-3px); box-shadow:0 14px 26px rgba(22,26,45,.18); }
  .tile-lbl{ font-size:12.5px; font-weight:600; color:#2a3d5c; }
  .t-notice{ background:linear-gradient(140deg,#1a5bb0,#2f74c9); }
  .t-member{ background:linear-gradient(140deg,#0e7a6b,#16b39a); }
  .t-task{ background:linear-gradient(140deg,#c77d18,#e0a338); }
  .t-add{ background:rgba(255,255,255,.72); border:1.5px dashed #aebfd4; }

  /* cards grid */
  .grid{ display:grid; grid-template-columns:1.32fr 1fr; grid-template-rows:auto 1fr; gap:16px; margin-top:52px; align-items:stretch; }
  [data-widget="notice"]{ grid-column:1; grid-row:1 / span 2; display:flex; flex-direction:column; }
  #noticeList{ display:flex; flex-direction:column; flex:1; overflow:hidden; }
  #noticeList .row{ flex:1; min-height:0; align-items:center; justify-content:space-between; }
  [data-widget="schedule"]{ grid-column:2; grid-row:1; }

  .card-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
  .card-title{ display:flex; align-items:center; gap:9px; font-size:16px; font-weight:700; }

  .c-amber{ background:#fbf0df; color:#bf7714; } .c-violet{ background:#e9f1fc; color:#2f74c9; }

  .row:hover{ background:var(--line-soft); }
  .row + .row{ border-top:1px solid var(--line-soft); }

  [data-widget="notice"] .dotmark{ margin-top:0; }
  [data-widget="notice"] .r-meta{ margin-top:1px; }
  .row .r-main{ flex:1; min-width:0; }

  .row .r-body{ font-size:13px; color:var(--ink-2); margin-top:4px; line-height:1.5; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .row .r-s{ font-size:12.5px; color:var(--ink-3); margin-top:4px; font-weight:500; }
  .row .r-meta{ font-size:12.5px; color:var(--ink-3); font-weight:500; flex-shrink:0; }
  .dotmark{ width:9px; height:9px; border-radius:50%; flex-shrink:0; }

  .empty{ height:150px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:11px; color:var(--ink-3); font-size:13.5px; font-weight:500; }
  .empty svg{ color:#ccd1de; }

  /* schedule chip */
  .sched-row{ display:flex; align-items:center; gap:14px; padding:13px 12px; border-radius:12px; cursor:pointer; transition:background .14s; }
  .sched-row:hover{ background:var(--line-soft); }

  .date-chip .d{ font-size:20px; font-weight:800; line-height:1.15; }

  .mf-right .mf-ico{ background:#0e7a6b; color:#fff; }
  .mem-fig .mf-body{ display:flex; flex-direction:column; gap:3px; min-width:0; }
  .mem-fig .mf-num{ font-size:30px; font-weight:800; letter-spacing:-.03em; line-height:1; display:flex; align-items:baseline; gap:6px; }
  .mf-total .mf-num{ color:#123c78; }
  .mf-right .mf-num{ color:#0c5d52; }
  .mem-fig .mf-pct{ font-size:13px; font-weight:700; color:#0e7a6b; background:rgba(14,122,107,.14); padding:2px 7px; border-radius:999px; letter-spacing:0; }
  .mem-fig .mf-lbl{ font-size:13px; font-weight:600; color:var(--ink-2); }
  .mem-stat .big{ font-size:30px; font-weight:800; letter-spacing:-.03em; }
  .mem-stat .unit{ font-size:14px; color:var(--ink-2); font-weight:600; }
  .mem-list{ display:flex; flex-direction:column; }
  .ava-s{ width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff; font-size:13px; font-weight:700; flex-shrink:0; }

  @media (max-width:1080px){

      {k:'clouds', label:'하늘', css:'linear-gradient(180deg,#8fbce8 0%,#bcd8f0 50%,#eef4fa 100%)'},
      {k:'night', label:'야경', css:'linear-gradient(150deg,#36506b 0%,#243447 60%,#161f2b 100%)'}
    ];
    var widgets=[
      {k:'notice', t:'최근 공지', d:'최신 공지사항', cls:'c-indigo'},
      {k:'schedule', t:'다가오는 일정', d:'예정된 일정', cls:'c-violet'},
      {k:'member', t:'구성원 현황', d:'등록된 구성원', cls:'c-emerald'}
    ];
    var BG_KEY='moida_dash_bg', W_KEY='moida_dash_widgets';
    var state={ bg:JSON.parse(localStorage.getItem(BG_KEY)||'null'), hidden:JSON.parse(localStorage.getItem(W_KEY)||'[]') };

    function applyBg(){
      if(!state.bg){ cover.removeAttribute('data-bg'); cover.style.removeProperty('--cover-bg'); return; }
      var css;
      if(state.bg.type==='color'){ var c=state.bg.value; css='linear-gradient(176deg,'+c+' 0%, '+c+'cc 30%, '+hexFade(c)+' 70%, #f3f5f8 100%)'; }
      else { var im=images.find(function(x){return x.k===state.bg.value;}); css=im?im.css:DEFAULT_COVER; }
      cover.style.setProperty('--cover-bg', css); cover.setAttribute('data-bg','1');
    }
    function hexFade(h){ return h+'55'; }
    function applyWidgets(){ widgets.forEach(function(w){ var el=document.querySelector('.card[data-widget="'+w.k+'"]'); if(el) el.setAttribute('data-hidden', state.hidden.indexOf(w.k)>=0?'1':'0'); }); }
    applyBg(); applyWidgets();

    // build modal controls
    var cw=document.getElementById('wmColors');
    cw.innerHTML=colors.map(function(c){ return '<div class="wm-color" data-c="'+c+'" style="background:'+c+'"></div>'; }).join('');
    var iw=document.getElementById('wmImgs');
    iw.innerHTML=images.map(function(im){ return '<div class="wm-img" data-i="'+im.k+'" style="background-image:'+im.css+'" title="'+im.label+'"></div>'; }).join('')+'<div class="wm-img more">갤러리 더보기</div>';
    var ww=document.getElementById('wmWidgets');
    ww.innerHTML=widgets.map(function(w){ return '<div class="wm-w"><span class="wm-w-ic '+w.cls+'"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="3"/></svg></span><div class="wm-w-info"><div class="wm-w-t">'+w.t+'</div><div class="wm-w-d">'+w.d+'</div></div><div class="wm-toggle" data-w="'+w.k+'"></div></div>'; }).join('');

    function syncUI(){
      document.querySelectorAll('.wm-color').forEach(function(el){ el.classList.toggle('sel', state.bg&&state.bg.type==='color'&&state.bg.value===el.dataset.c); });
      document.querySelectorAll('.wm-img[data-i]').forEach(function(el){ el.classList.toggle('sel', state.bg&&state.bg.type==='image'&&state.bg.value===el.dataset.i); });
      document.querySelectorAll('.wm-toggle').forEach(function(el){ el.classList.toggle('on', state.hidden.indexOf(el.dataset.w)<0); });
    }
    syncUI();

    var ovl=document.getElementById('wmOvl');
    function open(){ syncUI(); ovl.classList.add('show'); }
    function close(){ ovl.classList.remove('show'); }
    document.getElementById('widgetSetBtn').addEventListener('click', open);
    document.getElementById('wmClose').addEventListener('click', close);
    ovl.addEventListener('click', function(e){ if(e.target===ovl) close(); });
    document.addEventListener('keydown', function(e){ if(e.key==='Escape') close(); });

    cw.addEventListener('click', function(e){ var el=e.target.closest('.wm-color'); if(!el) return; state.bg={type:'color', value:el.dataset.c}; localStorage.setItem(BG_KEY, JSON.stringify(state.bg)); applyBg(); syncUI(); });
    iw.addEventListener('click', function(e){ var el=e.target.closest('.wm-img[data-i]'); if(!el) return; state.bg={type:'image', value:el.dataset.i}; localStorage.setItem(BG_KEY, JSON.stringify(state.bg)); applyBg(); syncUI(); });
    ww.addEventListener('click', function(e){ var el=e.target.closest('.wm-toggle'); if(!el) return; var k=el.dataset.w; var i=state.hidden.indexOf(k); if(i>=0) state.hidden.splice(i,1); else state.hidden.push(k); localStorage.setItem(W_KEY, JSON.stringify(state.hidden)); applyWidgets(); syncUI(); });
  })();

  /* ===== 대시보드 동적 데이터 ===== */
  (function(){
    var _au=JSON.parse(sessionStorage.getItem('moida_auth_user')||'{}');
    var _uid=_au.effectiveUid||_au.uid||'default';
    function esc(s){ return (s||'').replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }

    // ── 최근 공지 (최신 5개) ──
    (function(){
      var el=document.getElementById('noticeList'); if(!el) return;
      var SRC={admin:'총관리자',central:'민주당 중앙당',gyeonggi:'경기도당',council:'경기도의회'};
      var list=[];
      try{ var c=localStorage.getItem('moida_notices_cache'); if(c) list=JSON.parse(c); }catch(e){}
      if(!list.length) list=[
        {title:'후원회 관련 내용입니다.',date:'2026.06.19',src:'admin',isNew:true,body:'이번 분기 후원회 운영 및 회계 보고 관련 안내드립니다.'},
        {title:'6월 정기 운영위원회 일정 안내',date:'2026.06.12',src:'admin',isNew:false,body:'6월 정기 운영위원회를 6월 24일(화) 오후 7시 당협 사무실 회의실에서 개최합니다.'},
        {title:'개인정보 보호 및 명부 관리 지침 업데이트',date:'2026.06.03',src:'admin',isNew:false,body:'구성원 명부·개인정보 관리 지침이 일부 개정되었습니다.'}
      ];
      list=list.slice(0,5); // 최신 5개만
      el.innerHTML=list.map(function(n){
        var body=(n.body||'').replace(/\n/g,' ').trim();
        return '<div class="row" onclick="location.href=\'notices.html\'" style="cursor:pointer">'
          +'<span class="dotmark '+(n.isNew?'s-red':'s-blue')+'"></span>'
          +'<div class="r-main"><div class="r-t">'+esc(n.title)+'</div>'
          +(body?'<div class="r-body">'+esc(body)+'</div>':'')
          +'<div class="r-s">'+esc(SRC[n.src]||'공지사항')+'</div></div>'
          +'<span class="r-meta">'+esc(n.date)+'</span></div>';
      }).join('');
    })();

    // ── 다가오는 일정 (오늘 이후 최대 3개) ──
    (function(){
      var el=document.getElementById('schedList'); if(!el) return;
      var events=[];
      try{ var raw=localStorage.getItem('moida_events_'+_uid); if(raw) events=JSON.parse(raw); }catch(e){}
      var today=new Date(); today.setHours(0,0,0,0);
      var dows=['일','월','화','수','목','금','토'];
      var upcoming=events.filter(function(e){
        var p=(e.date||'').split('-'); if(p.length<3) return false;
        var d=new Date(+p[0],+p[1]-1,+p[2]); return d>=today;
      }).sort(function(a,b){ return (a.date+a.time)<(b.date+b.time)?-1:1; }).slice(0,3);
      if(!upcoming.length){ el.innerHTML='<div class="sched-row" style="color:var(--ink-3);font-size:13px;padding:12px 4px">예정된 일정이 없습니다.</div>'; return; }
      el.innerHTML=upcoming.map(function(e){
        var p=(e.date||'').split('-'); var d=new Date(+p[0],+p[1]-1,+p[2]);
        var mon=(d.getMonth()+1)+'월', day=d.getDate(), dow=dows[d.getDay()]||'';
        var dateStr=e.date.replace(/-/g,'.')+' ('+dow+') · '+e.time;
        return '<div class="sched-row" onclick="location.href=\'schedule.html?open='+encodeURIComponent(e.title)+'\'" style="cursor:pointer">'
          +'<div class="date-chip"><span class="m">'+mon+'</span><span class="d">'+day+'</span></div>'
          +'<div class="r-main"><div class="r-t">'+esc(e.title)+'</div><div class="r-s">'+esc(dateStr)+'</div></div></div>';
      }).join('');
    })();

    // ── 구성원 현황 ──
    (function(){
      var members=[];
      try{ var raw=localStorage.getItem('moida_members_'+_uid); if(raw) members=JSON.parse(raw); }catch(e){}
      var total=members.length;
      var right=members.filter(function(m){ return m.type==='권리당원'; }).length;
      var pct=total?Math.round(right/total*100):0;
      var tEl=document.getElementById('memTotal'); if(tEl) tEl.textContent=total;
      var pEl=document.getElementById('memPct'); if(pEl) pEl.textContent=total?pct+'%':'';
      var rEl=document.getElementById('memRight'); if(rEl) rEl.innerHTML=right+(total?'<span class="mf-pct">'+pct+'%</span>':'');
    })();
  })();

  /* ===== 통합 검색 ===== */
  (function(){
    var input=document.getElementById('globalSearch');
    var box=document.getElementById('searchResults');
    var goBtn=document.getElementById('searchGo');
    if(!input||!box) return;
    function esc(s){ return s.replace(/[&<>"]/g,function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }
    function hl(text,q){ var t=esc(text); var i=text.toLowerCase().indexOf(q); if(i<0||!q) return t; var e=esc(text.slice(i,i+q.length)); return esc(text.slice(0,i))+'<b>'+e+'</b>'+esc(text.slice(i+q.length)); }
    function collect(sel,link){ return [].map.call(document.querySelectorAll(sel),function(r){ var t=r.querySelector('.r-t'); var s=r.querySelector('.r-s'); return { t:t?t.textContent.trim():'', s:s?s.textContent.trim():'', link:link }; }).filter(function(x){return x.t;}); }
    var ICO={ notice:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l18-5v12L3 14v-3z"/><path d="M11.6 16.8a3 3 0 0 1-5.8 1"/></svg>',
      sched:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>',
      member:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3"/><path d="M3 20a6 6 0 0 1 12 0"/><circle cx="17" cy="7" r="2.3"/><path d="M16.5 13.5a5 5 0 0 1 4.5 5"/></svg>' };
    function render(){
      var q=input.value.trim().toLowerCase();
      if(!q){ box.classList.remove('show'); box.innerHTML=''; return; }
      var notices=collect('[data-widget="notice"] .row',"notices.html").filter(function(x){ return (x.t+x.s).toLowerCase().indexOf(q)>=0; });
      var scheds=collect('[data-widget="schedule"] .sched-row',"schedule.html").filter(function(x){ return (x.t+x.s).toLowerCase().indexOf(q)>=0; });
      var html='';
      html+='<div class="sr-group">구성원</div><a class="sr-item" href="members.html?q='+encodeURIComponent(input.value.trim())+'"><span class="sr-ico s-member">'+ICO.member+'</span><div class="sr-body"><div class="sr-t">구성원에서 “'+esc(input.value.trim())+'” 검색</div><div class="sr-s">이름·연락처·주소·소속·추천인 전체 검색</div></div></a>';
      if(notices.length){ html+='<div class="sr-group">공지 ('+notices.length+')</div>'+notices.map(function(x){ return '<a class="sr-item" href="'+x.link+'"><span class="sr-ico s-notice">'+ICO.notice+'</span><div class="sr-body"><div class="sr-t">'+hl(x.t,q)+'</div><div class="sr-s">'+esc(x.s)+'</div></div></a>'; }).join(''); }
      if(scheds.length){ html+='<div class="sr-group">일정 ('+scheds.length+')</div>'+scheds.map(function(x){ return '<a class="sr-item" href="'+x.link+'"><span class="sr-ico s-sched">'+ICO.sched+'</span><div class="sr-body"><div class="sr-t">'+hl(x.t,q)+'</div><div class="sr-s">'+esc(x.s)+'</div></div></a>'; }).join(''); }
      box.innerHTML=html; box.classList.add('show');
    }
    function go(){ var q=input.value.trim(); if(q) location.href='members.html?q='+encodeURIComponent(q); }
    input.addEventListener('input', render);
    input.addEventListener('focus', render);
    input.addEventListener('keydown', function(e){ if(e.key==='Enter'){ var first=box.querySelector('.sr-item'); if(first&&box.classList.contains('show')){ location.href=first.getAttribute('href'); } else { go(); } } else if(e.key==='Escape'){ box.classList.remove('show'); } });
    goBtn&&goBtn.addEventListener('click', go);
    document.addEventListener('mousedown', function(e){ if(!e.target.closest('.search')) box.classList.remove('show'); });
  })();

  /* ===== 알림 ===== */
  (function(){
    var btn=document.getElementById('notiBtn'), panel=document.getElementById('notiPanel'),
        list=document.getElementById('notiList'), dot=document.getElementById('notiDot'),
        readAll=document.getElementById('notiReadAll');
    if(!btn||!panel) return;
    // 알림 소스 (새 공지/일정/구성원). 새 항목이 생기면 여기에 추가하면 됩니다.
    var FEED=[
      { id:'n-notice-1', type:'notice', t:'새 공지 — 후원회 관련 내용입니다.', s:'공지사항 · 2026.06.19', link:'notices.html' },
      { id:'n-sched-1',  type:'sched',  t:'새 일정 — 진로', s:'2026.06.19 (금) · 11:30', link:'schedule.html' },
      { id:'n-member-1', type:'member', t:'새 구성원 등록 — 김민재', s:'성포동 · 권리당원', link:'members.html' }
    ];
    var ICO={ notice:'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l18-5v12L3 14v-3z"/><path d="M11.6 16.8a3 3 0 0 1-5.8 1"/></svg>',
      sched:'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>',
      member:'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3"/><path d="M3 20a6 6 0 0 1 12 0"/><circle cx="17" cy="7" r="2.3"/><path d="M16.5 13.5a5 5 0 0 1 4.5 5"/></svg>' };
    var RK='moida_noti_read';
    function readSet(){ try{ return JSON.parse(localStorage.getItem(RK)||'[]'); }catch(e){ return []; } }
    function saveRead(arr){ localStorage.setItem(RK, JSON.stringify(arr)); }
    function unreadCount(){ var r=readSet(); return FEED.filter(function(f){ return r.indexOf(f.id)<0; }).length; }
    function syncDot(){ var n=unreadCount(); if(n>0){ dot.textContent=n; dot.style.display='flex'; } else { dot.style.display='none'; } }
    function render(){
      var r=readSet();
      var items=FEED.filter(function(f){ return r.indexOf(f.id)<0; });
      if(!items.length){ list.innerHTML='<div class="noti-empty">새 알림이 없습니다.</div>'; return; }
      list.innerHTML=items.map(function(f){ return '<a class="noti-item unread" href="'+f.link+'" data-id="'+f.id+'"><span class="noti-ico n-'+f.type+'">'+ICO[f.type]+'</span><div class="noti-body"><div class="noti-t">'+f.t+'</div><div class="noti-s">'+f.s+'</div></div><span class="noti-unreaddot"></span></a>'; }).join('');
    }
    function markRead(id){ var r=readSet(); if(r.indexOf(id)<0){ r.push(id); saveRead(r); } }
    btn.addEventListener('click', function(e){ e.stopPropagation(); var open=panel.classList.toggle('show'); if(open) render(); });
    list.addEventListener('click', function(e){ var it=e.target.closest('.noti-item'); if(it){ markRead(it.dataset.id); } });
    readAll.addEventListener('click', function(){ saveRead(FEED.map(function(f){return f.id;})); render(); syncDot(); });
    document.addEventListener('mousedown', function(e){ if(!e.target.closest('.noti-wrap')) panel.classList.remove('show'); });
    syncDot();
  })();

  /* ===== 바로가기 ===== */
  (function(){
    var OPTS=[
      { key:'all',      label:'전체 공지',      color:'#64748b', href:'notices.html' },
      { key:'admin',    label:'MOIDA 공지',     color:'#15182a', href:'notices.html?src=admin' },
      { key:'central',  label:'민주당 중앙당',   color:'#1452a0', href:'notices.html?src=central' },
      { key:'gyeonggi', label:'민주당 경기도당', color:'#0d9488', href:'notices.html?src=gyeonggi' },
      { key:'council',  label:'경기도의회',      color:'#b45309', href:'notices.html?src=council' }
    ];
    var KEY='moida_shortcuts';
    function get(){ try{ return JSON.parse(localStorage.getItem(KEY)||'[]'); }catch(e){ return []; } }
    function save(a){ localStorage.setItem(KEY, JSON.stringify(a)); }
    var sec=document.getElementById('scSec'), list=document.getElementById('scList'),
        tile=document.getElementById('addTile');
    function renderSidebar(){
      var keys=get();
      var items=OPTS.filter(function(o){ return keys.indexOf(o.key)>=0; });
      if(!items.length){ sec.style.display='none'; list.innerHTML=''; return; }
      sec.style.display='block';
      list.innerHTML=items.map(function(o){
        return '<a class="sc-item" href="'+o.href+'" data-tip="'+o.label+'"><span class="sc-dot" style="background:'+o.color+'"></span><span class="nm">'+o.label+'</span><button class="sc-del" data-key="'+o.key+'" title="삭제"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M6 6l12 12M18 6 6 18"/></svg></button></a>';
      }).join('');
      list.querySelectorAll('.sc-del').forEach(function(b){
        b.addEventListener('click', function(e){ e.preventDefault(); e.stopPropagation(); var k=b.dataset.key; save(get().filter(function(x){return x!==k;})); renderSidebar(); });
      });
    }
    // modal
    var ovl=document.createElement('div'); ovl.className='sc-ovl';
    ovl.innerHTML='<div class="sc-modal"><div class="sc-mhead"><div class="sc-mtitle">바로가기 추가</div><div class="sc-msub">사이드바에 추가할 공지 항목을 선택하세요</div></div><div class="sc-opts" id="scOpts"></div><div class="sc-mfoot"><button class="sc-btn ghost" id="scCancel">취소</button><button class="sc-btn solid" id="scSave">저장</button></div></div>';
    document.body.appendChild(ovl);
    var optsBox=ovl.querySelector('#scOpts');
    var sel=[];
    function openModal(){
      sel=get().slice();
      optsBox.innerHTML=OPTS.map(function(o){
        return '<div class="sc-opt'+(sel.indexOf(o.key)>=0?' on':'')+'" data-key="'+o.key+'"><span class="sc-dot" style="background:'+o.color+'"></span><span class="ol">'+o.label+'</span><span class="sc-check"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 6"/></svg></span></div>';
      }).join('');
      optsBox.querySelectorAll('.sc-opt').forEach(function(el){
        el.addEventListener('click', function(){ var k=el.dataset.key; var i=sel.indexOf(k); if(i>=0){ sel.splice(i,1); el.classList.remove('on'); } else { sel.push(k); el.classList.add('on'); } });
      });
      ovl.classList.add('show');
    }
    function close(){ ovl.classList.remove('show'); }
    tile&&tile.addEventListener('click', openModal);
    ovl.querySelector('#scCancel').addEventListener('click', close);
    ovl.querySelector('#scSave').addEventListener('click', function(){ save(sel.slice()); renderSidebar(); close(); });
    ovl.addEventListener('click', function(e){ if(e.target===ovl) close(); });
    renderSidebar();
  })();

  // 로그인 계정 표시
  (function(){
    try{
      var u=JSON.parse(sessionStorage.getItem('moida_auth_user')||localStorage.getItem('moida_auth_user')||'{}');
      var el=document.getElementById('sideFootUser');
      if(el&&(u.displayName||u.email)){
        el.innerHTML='<div style="font-weight:700;color:var(--ink-2);font-size:13px;padding:2px 10px 1px">'+(u.displayName||'')+'</div>'
          +'<div style="font-size:11.5px;color:var(--ink-3);padding:0 10px 6px;word-break:break-all">'+(u.email||'')+'</div>';
      }
    }catch(e){}
  })();
</script>
